# Single source of truth for app version metadata. Consumed by:
#   - androidApp/build.gradle.kts (versionName / versionCode)
#   - shared/build.gradle.kts generateBuildFlagsAndroid (derives BuildFlags.isBeta from major==0)
#
# Versioning convention (per agent-team deliberation 2026-05-05):
#   - Pre-1.0 releases use semver `0.X.Y` (major==0 = pre-stable API).
#     Closed beta = `0.1.0`, beta hotfixes = `0.1.1`, `0.1.2`, ...
#     Subsequent beta milestones may bump minor: `0.2.0`, `0.9.0`, etc.
#   - Phase 40 GA = `1.0.0`. Major bump signals API stability commitment.
#   - We deliberately AVOID hyphen-suffixed prerelease identifiers
#     (e.g. `1.0.0-beta1`) because iOS's `CFBundleShortVersionString`
#     accepts only digits and dots — `xcrun altool` / App Store Connect
#     reject hyphen-suffixed values at upload time.
#
# COUPLED EDIT: when bumping VERSION_NAME from a major==0 version to a
# major>=1 GA version (Phase 40), also:
#   1. Flip `IS_BETA: "YES"` -> `"NO"` in iosApp/project.yml (settings.base
#      block). xcconfig macros are evaluated by xcodegen, not from
#      version.properties — iOS has no codegen path. Failing to flip this
#      on iOS will ship a production binary that behaves as a beta build
#      (PostHog initializes, bug-reporter gesture active).
#   2. Update or remove `~/.claude/projects/.../memory/pre_v1_breaking_changes.md`
#      — Phase 40 GA re-imposes backward-compat discipline.
# The androidHostTest `BuildFlagsTest` codegen assertion is automatic via
# `version.properties` parsing and will simply flip with the version bump.
VERSION_NAME=0.1.1
VERSION_CODE=9
