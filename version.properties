# Single source of truth for app version metadata. Consumed by:
#   - androidApp/build.gradle.kts (versionName / versionCode)
#   - shared/build.gradle.kts generateBuildFlagsAndroid (derives BuildFlags.isBeta from -beta suffix)
#
# COUPLED EDIT: when bumping VERSION_NAME from `*-beta*` to a GA version
# (Phase 40), also flip `IS_BETA: "YES"` -> `"NO"` in iosApp/project.yml
# (settings.base block). The Android side is automated via codegen; iOS
# requires the manual edit because xcconfig macros are evaluated by xcodegen,
# not from version.properties. Failing to flip this on iOS will ship a
# production binary that behaves as a beta build (PostHog initializes,
# bug-reporter gesture active). The androidHostTest BuildFlagsTest
# `isBeta_matches_versionProperties_suffix` will also need to flip its
# assertion in the same commit.
VERSION_NAME=1.0.0-beta1
VERSION_CODE=3
