appId: io.github.b150005.knitnote
name: "Store Screenshots - iOS"
tags:
  - screenshots
  - ios
---
# ============================================================
# Store Screenshot Capture Flow — iOS
# Run: maestro test e2e/screenshots/capture_ios.yaml
# Output: ~/.maestro/screenshots/ (default) or use --output
# ============================================================

# --- Setup: Clean state ---
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# ============================================================
# Screenshot 1: Onboarding
# ============================================================
- assertVisible:
    id: "onboardingPage1"
- takeScreenshot: screenshot_01_onboarding

# Complete onboarding
- runFlow: ../helpers/complete_onboarding_ios.yaml

# ============================================================
# Screenshot 2: Empty State (Project List)
# ============================================================
- assertVisible:
    id: "emptyStateLabel"
- takeScreenshot: screenshot_02_empty_state

# ============================================================
# Create sample projects (mirror P0_create_project.yaml selectors)
# ============================================================

# Project 1: Autumn Cardigan (Phase 33.4 iOS ids: createProjectFab toolbar +;
# projectNameInput, totalRowsInput, createProjectButton in the sheet.)
- tapOn:
    id: "createProjectFab"
# Phase 33.5 added `newProjectDialog` landmark on createProjectSheet.
- assertVisible:
    id: "newProjectDialog"
- tapOn:
    id: "projectNameInput"
- inputText: "Autumn Cardigan"
- tapOn:
    id: "totalRowsInput"
- inputText: "240"
- tapOn:
    id: "createProjectButton"
- assertVisible: "Autumn Cardigan"

# Tap into project to increment rows
# NOTE: Maestro + iOS 26 has a known bug where taps silently fail after the
# first tap on SwiftUI Buttons inside List sections. We use a single increment
# here just to change the status to In Progress for a more interesting screenshot.
- tapOn: "Autumn Cardigan"
- assertVisible:
    id: "rowCounter"
- tapOn:
    id: "incrementButton"

# Go back to project list (iOS back button shows parent nav title "Knit Note",
# which is locale-identical per the app_name convention).
- tapOn: "Knit Note"

# Project 2: Winter Socks
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "Winter Socks"
- tapOn:
    id: "totalRowsInput"
- inputText: "80"
- tapOn:
    id: "createProjectButton"

# Project 3: Baby Blanket
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "Baby Blanket"
- tapOn:
    id: "totalRowsInput"
- inputText: "200"
- tapOn:
    id: "createProjectButton"

# ============================================================
# Screenshot 3: Project List (with data)
# ============================================================
- assertVisible: "Autumn Cardigan"
- assertVisible: "Winter Socks"
- assertVisible: "Baby Blanket"
- takeScreenshot: screenshot_03_project_list

# ============================================================
# Screenshot 4: Row Counter
# ============================================================
- tapOn: "Autumn Cardigan"
- assertVisible:
    id: "rowCounter"
- takeScreenshot: screenshot_04_row_counter

# Go back
- tapOn: "Knit Note"

# ============================================================
# Screenshot 5: Pattern Library (Phase 33.5: open overflow menu, then tap
# locale-independent id `patternLibraryButton`)
# ============================================================
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "patternLibraryButton"
- takeScreenshot: screenshot_05_pattern_library
- tapOn: "Knit Note"

# ============================================================
# Screenshot 6: Profile (Phase 33.5: open overflow menu, then tap
# locale-independent id `profileButton`)
# ============================================================
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "profileButton"
- takeScreenshot: screenshot_06_profile

# ============================================================
# Done
# ============================================================
- pressKey: home
