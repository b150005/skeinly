appId: ${APP_ID}
name: "Helper - Complete Onboarding"
---
# Complete onboarding carousel after clearState.
#
# Phase 39.4: Android `BuildFlags.isBeta` is derived from `version.properties`
# `VERSION_NAME` semver major component (== 0 ⇒ beta). The current `0.1.0`
# build appends a 4th diagnostic-consent page. Three swipes traverse Track →
# Count → Library → Diagnostic Consent (last page). Drop the third swipe at
# v1.0 GA (major == 1) — see Tech Debt Backlog `### Phase 40 GA release prep`.
- assertVisible:
    id: "onboardingPage1"
- swipe:
    direction: LEFT
    duration: 400
- swipe:
    direction: LEFT
    duration: 400
- swipe:
    direction: LEFT
    duration: 400
- tapOn:
    id: "getStartedButton"
