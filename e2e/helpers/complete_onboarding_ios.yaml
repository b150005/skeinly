appId: io.github.b150005.skeinly
name: "Helper - Complete Onboarding"
---
# Bypass onboarding by relaunching with NSUserDefaults launch argument.
# Direct SwiftUI button tapping (text-based and id-based) is unreliable
# on headless CI simulators — Maestro finds the element but the tap
# does not register in SwiftUI. This approach sets the preference via
# iOS launch argument domain, which NSUserDefaults picks up with
# higher precedence than the (cleared) persistent store.
- stopApp: io.github.b150005.skeinly
- launchApp:
    appId: io.github.b150005.skeinly
    # NSUserDefaults launch-arg keys must include the leading "-" so iOS
    # registers them as defaults at app start. The map form previously used
    # here (without the dash) did not write to NSUserDefaults, leaving the
    # OnboardingScreen visible and breaking every Maestro flow downstream.
    # Array form mirrors the XCUITest convention in OnboardingUITests.swift.
    arguments:
      "-has_seen_onboarding": "true"
      # Bypass AppRouter auth gate (mirrors AppRouter.swift `local_only_mode`
      # check). Without this, e2e builds that pick up a real `SUPABASE_URL`
      # land on LoginScreen and every downstream `assertVisible` fails.
      "-local_only_mode": "true"
