appId: com.knitnote.ios
name: "Helper - Complete Onboarding"
---
# Complete onboarding carousel after clearState.
# Uses accessibilityIdentifier for reliable tap targeting on CI simulators.
# Text-based tapOn ("Skip") was unreliable on headless CI — the SwiftUI
# button did not register the touch, leaving the app stuck on onboarding.
- assertVisible: "Track Your Knitting Projects"
- tapOn:
    id: "skipButton"
    retryTapIfNoChange: true
# Verify onboarding was dismissed before returning to the calling flow
- assertNotVisible: "Track Your Knitting Projects"
