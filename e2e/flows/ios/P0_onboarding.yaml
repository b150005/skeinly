appId: io.github.b150005.knitnote
name: "P0 - Onboarding Flow"
tags:
  - p0
  - ios
  - skip-ios26
---
# Pre-condition: clear app state for test isolation
- clearState: io.github.b150005.knitnote

# Launch the app — first run shows onboarding
- launchApp:
    appId: io.github.b150005.knitnote

# Verify page 1 via locale-independent testTag
- assertVisible:
    id: "onboardingPage1"

# Verify Skip button is present
- assertVisible:
    id: "skipButton"

# Swipe to page 2
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage2"

# Swipe to page 3 (last page)
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage3"

# Verify "Get Started" button appears on last page
- assertVisible:
    id: "getStartedButton"

# Tap "Get Started" to complete onboarding
- tapOn:
    id: "getStartedButton"

# Verify we landed on ProjectList (app_name is locale-identical across en/ja)
- assertVisible:
    id: "projectListScreen"

# Relaunch the app — onboarding should NOT appear again
- stopApp: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Should go directly to ProjectList — no onboarding page visible
- assertVisible:
    id: "projectListScreen"
- assertNotVisible:
    id: "onboardingPage1"
