appId: io.github.b150005.skeinly
name: "P0 - Onboarding Flow"
tags:
  - p0
  - ios
  - skip-ios26
---
# Pre-condition: clear app state for test isolation
- clearState: io.github.b150005.skeinly

# Launch the app — first run shows onboarding.
# `-local_only_mode true` bypasses AppRouter's auth gate so the
# post-onboarding ProjectList assertion lands without a real login.
- launchApp:
    appId: io.github.b150005.skeinly
    arguments:
      "-local_only_mode": "true"

# Verify page 1 via locale-independent testTag
- assertVisible:
    id: "onboardingPage1"

# Verify Skip button is present
- assertVisible:
    id: "skipButton"

# Swipe to page 2
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage2"

# Swipe to page 3
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage3"

# Phase 39.4: iOS production builds always set `IS_BETA: "YES"` (xcconfig
# macro in `iosApp/project.yml`), so the 4th diagnostic-consent page is
# always present. Drop this stanza at v1.0 GA when IS_BETA flips off —
# see Tech Debt Backlog `### Phase 40 GA release prep`.
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage4"

# Verify "Get Started" button appears on last page
- assertVisible:
    id: "getStartedButton"

# Tap "Get Started" to complete onboarding
- tapOn:
    id: "getStartedButton"

# Verify we landed on ProjectList (app_name is locale-identical across en/ja)
- assertVisible:
    id: "projectListScreen"

# Relaunch the app — onboarding should NOT appear again
- stopApp: io.github.b150005.skeinly
- launchApp:
    appId: io.github.b150005.skeinly
    arguments:
      "-local_only_mode": "true"

# Should go directly to ProjectList — no onboarding page visible
- assertVisible:
    id: "projectListScreen"
- assertNotVisible:
    id: "onboardingPage1"
