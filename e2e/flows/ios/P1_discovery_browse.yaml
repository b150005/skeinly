appId: io.github.b150005.knitnote
name: "P1 - Discovery Browse"
tags:
  - p1
  - ios
  - requires-supabase
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible:
    id: "projectListScreen"

# Navigate to Discovery screen via menu (Phase 33.5 pivoted ProjectListScreen
# menu entry to `discoverPatternsButton` accessibilityIdentifier).
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "discoverPatternsButton"
- assertVisible:
    id: "discoveryScreen"

# Interact with difficulty filter via accessibilityIdentifier (locale-independent)
- tapOn:
    id: "difficultyBeginnerChip"

# Reset filter to All
- tapOn:
    id: "difficultyAllChip"

# Back navigation
- tapOn: "Back"
- assertVisible:
    id: "projectListScreen"
