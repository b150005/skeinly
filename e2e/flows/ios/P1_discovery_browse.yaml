appId: io.github.b150005.knitnote.ios
name: "P1 - Discovery Browse"
tags:
  - p1
  - ios
  - requires-supabase
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.ios
- launchApp:
    appId: io.github.b150005.knitnote.ios

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# Navigate to Discovery screen via menu (iOS ProjectListScreen.swift is not
# i18n'd yet — pivot to testTag when that migration ships).
- tapOn:
    id: "moreMenu"
- tapOn: "Discover Patterns"
- assertVisible:
    id: "discoveryScreen"

# Interact with difficulty filter via accessibilityIdentifier (locale-independent)
- tapOn:
    id: "difficultyBeginnerChip"

# Reset filter to All
- tapOn:
    id: "difficultyAllChip"

# Back navigation
- tapOn: "Knit Note"
- assertVisible: "Knit Note"
