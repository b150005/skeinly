appId: io.github.b150005.skeinly
name: "P2 - Screen Navigation"
tags:
  - p2
  - ios
---
# Pre-condition: clean state
- clearState: io.github.b150005.skeinly
- launchApp:
    appId: io.github.b150005.skeinly
    arguments:
      "-local_only_mode": "true"

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible:
    id: "projectListScreen"

# --- Navigate to Profile ---
# Phase 33.5: menu entry now has `profileButton` accessibilityIdentifier.
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "profileButton"
- assertVisible:
    id: "profileScreen"

# Phase E2E hardening (2026-05-06) — `accessibilityIdentifier("backButton")`
# from `SkeinlyBackButtonModifier` (applied across all NavigationStack
# destinations in `AppRouter.destinationView`) replaces the locale-coupled
# `tapOn: "Back"` (which broke on ja-JP simulators where the SwiftUI
# native back button rendered as `戻る`). The same id is reused below.
- tapOn:
    id: "backButton"
- assertVisible:
    id: "projectListScreen"

# --- Navigate to Settings ---
# Phase 33.5: menu entry now has `settingsButton` accessibilityIdentifier.
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "settingsButton"
- assertVisible:
    id: "settingsScreen"

# Go back to project list
- tapOn:
    id: "backButton"
- assertVisible:
    id: "projectListScreen"

# --- Navigate to Project Detail and back ---
# Create a project first (Phase 33.4 iOS ids — locale-independent)
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "Nav Test"
- tapOn:
    id: "createProjectButton"
- assertVisible: "Nav Test"

# Go to detail
- tapOn: "Nav Test"
- assertVisible:
    id: "rowCounter"

# Go back
- tapOn:
    id: "backButton"
- assertVisible:
    id: "projectListScreen"
- assertVisible: "Nav Test"
