appId: io.github.b150005.knitnote
name: "P2 - Screen Navigation"
tags:
  - p2
  - ios
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible:
    id: "projectListScreen"

# --- Navigate to Profile ---
# Phase 33.5: menu entry now has `profileButton` accessibilityIdentifier.
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "profileButton"
- assertVisible:
    id: "profileScreen"

# Go back to project list (iOS back button shows previous screen title)
- tapOn: "Back"
- assertVisible:
    id: "projectListScreen"

# --- Navigate to Settings ---
# Phase 33.5: menu entry now has `settingsButton` accessibilityIdentifier.
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "settingsButton"
- assertVisible:
    id: "settingsScreen"

# Go back to project list
- tapOn: "Back"
- assertVisible:
    id: "projectListScreen"

# --- Navigate to Project Detail and back ---
# Create a project first (Phase 33.4 iOS ids — locale-independent)
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "Nav Test"
- tapOn:
    id: "createProjectButton"
- assertVisible: "Nav Test"

# Go to detail
- tapOn: "Nav Test"
- assertVisible:
    id: "rowCounter"

# Go back
- tapOn: "Back"
- assertVisible:
    id: "projectListScreen"
- assertVisible: "Nav Test"
