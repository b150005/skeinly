appId: io.github.b150005.knitnote.ios
name: "P2 - Screen Navigation"
tags:
  - p2
  - ios
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.ios
- launchApp:
    appId: io.github.b150005.knitnote.ios

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# --- Navigate to Profile ---
# iOS: Profile is inside a Menu dropdown — open menu first.
# profileScreen is the locale-independent landmark; the menu entry label
# "Profile" is still a raw English literal because iOS ProjectListScreen is
# not yet migrated — that flip happens in the iOS ProjectList i18n PR.
- tapOn:
    id: "moreMenu"
- tapOn: "Profile"
- assertVisible:
    id: "profileScreen"

# Go back to project list (iOS back button shows previous screen title)
- tapOn: "Knit Note"
- assertVisible: "Knit Note"

# --- Navigate to Settings ---
# settingsScreen is the locale-independent landmark; the menu entry label
# "Settings" is still a raw English literal because iOS ProjectListScreen is
# not yet migrated — that flip happens in the iOS ProjectList i18n PR.
- tapOn:
    id: "moreMenu"
- tapOn: "Settings"
- assertVisible:
    id: "settingsScreen"

# Go back to project list
- tapOn: "Knit Note"
- assertVisible: "Knit Note"

# --- Navigate to Project Detail and back ---
# Create a project first
- tapOn:
    id: "createProjectButton"
- tapOn: "Project Title"
- inputText: "Nav Test"
- tapOn: "Create"
- assertVisible: "Nav Test"

# Go to detail
- tapOn: "Nav Test"
- assertVisible:
    id: "rowCounter"

# Go back
- tapOn: "Knit Note"
- assertVisible: "Knit Note"
- assertVisible: "Nav Test"
