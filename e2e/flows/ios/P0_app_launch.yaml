appId: io.github.b150005.knitnote
name: "P0 - App Launch & Project List"
tags:
  - p0
  - ios
---
# Pre-condition: clear app state for test isolation
- clearState: io.github.b150005.knitnote

# Launch the app (local-only mode — first run shows onboarding)
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Sprint A: brand title removed from the AppBar (the wordmark conveys no
# information once the user is inside the app). Anchor on the screen-level
# accessibilityIdentifier instead.
- assertVisible:
    id: "projectListScreen"

# Verify empty state messaging (Phase 33.5: locale-independent ids on the
# ContentUnavailableView Label + its empty-state Create CTA).
- assertVisible:
    id: "emptyStateLabel"
- assertVisible:
    id: "createProjectEmptyCta"

# Verify the create FAB is visible (Phase 33.4 renamed iOS toolbar +
# from createProjectButton → createProjectFab to align with Kotlin.)
- assertVisible:
    id: "createProjectFab"
