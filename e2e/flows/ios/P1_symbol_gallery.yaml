appId: io.github.b150005.knitnote
name: "P1 - Symbol Gallery (Phase 30.1)"
tags:
  - p1
  - ios
  - skip-ios26
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# Open the overflow menu and tap Symbol Dictionary.
# Post Phase 33.1 i18n migration the top-bar title is now a CMP StringResource,
# so do not assert on the literal English text — the grid container testTag
# below is locale-independent and is the stable landmark that proves navigation
# reached this screen.
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "symbolGalleryButton"

# Parallel to the Android flow: assert the grid container and exercise
# scrolling without relying on per-card accessibility identifiers, which are
# not reliably exposed through the LazyVGrid accessibility tree across
# platforms.
- assertVisible:
    id: "symbolGalleryGrid"

# Scroll through the grid
- scroll
- scroll

# Back navigation
- tapOn: "Knit Note"
- assertVisible: "Knit Note"
