appId: io.github.b150005.knitnote.ios
name: "P1 - Symbol Gallery (Phase 30.1)"
tags:
  - p1
  - ios
  - skip-ios26
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.ios
- launchApp:
    appId: io.github.b150005.knitnote.ios

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# Open the overflow menu and tap Symbol Dictionary
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "symbolGalleryButton"
- assertVisible: "Symbol Dictionary"

# Parallel to the Android flow: assert the grid container (Symbol Dictionary
# title already asserted above) and exercise scrolling without relying on
# per-card accessibility identifiers, which are not reliably exposed through
# the LazyVGrid accessibility tree across platforms.

# Scroll through the grid
- scroll
- scroll

# Back navigation
- tapOn: "Knit Note"
- assertVisible: "Knit Note"
