appId: io.github.b150005.knitnote
name: "P0 - Create Project"
tags:
  - p0
  - ios
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Wait for the empty state (Phase 33.5: locale-independent id)
- assertVisible:
    id: "emptyStateLabel"

# Tap the create FAB to open create sheet (Phase 33.4 renamed iOS toolbar +
# from createProjectButton → createProjectFab to align with Kotlin and avoid
# collision with the sheet-confirm button, which now owns createProjectButton.)
- tapOn:
    id: "createProjectFab"

# Verify the sheet opens (Phase 33.5: landmark id on createProjectSheet
# NavigationStack — SwiftUI nav title itself is not accessibilityIdentifier-
# addressable, so the container landmark is the locale-independent route).
- assertVisible:
    id: "newProjectDialog"

# Enter project name (accessibilityIdentifier — locale-independent)
- tapOn:
    id: "projectNameInput"
- inputText: "My Test Scarf"

# Enter total rows
- tapOn:
    id: "totalRowsInput"
- inputText: "100"

# Tap Create (sheet confirm button)
- tapOn:
    id: "createProjectButton"

# Verify the project appears in the list
- assertVisible: "My Test Scarf"
# `Not Started` resolves through `label_status_not_started` on the StatusBadge;
# on en-US CI it renders English. Pivot to a per-row status id once ProjectRow
# gains stable per-project accessibility landmarks.
- assertVisible: "Not Started"

# Verify empty state is gone (Phase 33.5: locale-independent id)
- assertNotVisible:
    id: "emptyStateLabel"
