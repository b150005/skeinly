appId: io.github.b150005.knitnote
name: "P1 - Edit Project Title & Total Rows"
tags:
  - p1
  - ios
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Create a project to edit (Phase 33.5: locale-independent ids)
- assertVisible:
    id: "emptyStateLabel"
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "OldName"
- tapOn:
    id: "totalRowsInput"
- inputText: "50"
- tapOn:
    id: "createProjectButton"

# Navigate to project detail
- assertVisible: "OldName"
- tapOn: "OldName"

# Verify detail screen loaded (accessibilityIdentifier-backed sync point)
- assertVisible:
    id: "rowCounter"

# Tap the edit button (accessibilityIdentifier, locale-independent)
- tapOn:
    id: "editProjectButton"

# Verify the edit sheet opens (Phase 33.5: landmark id on editSheet
# NavigationStack per the createProjectSheet precedent).
- assertVisible:
    id: "editProjectDialog"

# Clear and update the title (Phase 33.4 ids)
- tapOn:
    id: "projectNameInput"
- eraseText: 100
- inputText: "Updated Scarf"

# Clear and update total rows
- tapOn:
    id: "totalRowsInput"
- eraseText: 100
- inputText: "120"

# Save changes
- tapOn:
    id: "saveButton"

# Verify updated title is displayed on the detail screen (Phase 33.5: pivot
# "of 120 rows" → rowTotalLabel id; this flaked on CI for Phase 33.3 since the
# label_of_rows parametric render could race the save commit).
- assertVisible: "Updated Scarf"
- assertVisible:
    id: "rowTotalLabel"

# Go back and verify the list reflects the change
# (iOS back button shows previous screen's navigationTitle)
- tapOn: "Back"
- assertVisible: "Updated Scarf"
