appId: io.github.b150005.knitnote.ios
name: "P1 - Edit Project Title & Total Rows"
tags:
  - p1
  - ios
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.ios
- launchApp:
    appId: io.github.b150005.knitnote.ios

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_ios.yaml

# Create a project to edit (Phase 33.4: locale-independent ids)
- assertVisible: "No Projects Yet"
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "OldName"
- tapOn:
    id: "totalRowsInput"
- inputText: "50"
- tapOn:
    id: "createProjectButton"

# Navigate to project detail
- assertVisible: "OldName"
- tapOn: "OldName"

# Verify detail screen loaded (accessibilityIdentifier-backed sync point)
- assertVisible:
    id: "rowCounter"

# Tap the edit button (accessibilityIdentifier, locale-independent)
- tapOn:
    id: "editProjectButton"

# Verify the edit sheet opens.
# See P0_create_project.yaml — `Edit Project` text assertion is load-bearing on
# iOS SwiftUI NavigationStack title not being accessibilityIdentifier-addressable;
# pivots to a landmark id when iOS ProjectList/ProjectDetail sweep lands.
- assertVisible: "Edit Project"

# Clear and update the title (Phase 33.4 ids)
- tapOn:
    id: "projectNameInput"
- eraseText: 100
- inputText: "Updated Scarf"

# Clear and update total rows
- tapOn:
    id: "totalRowsInput"
- eraseText: 100
- inputText: "120"

# Save changes
- tapOn:
    id: "saveButton"

# Verify updated title is displayed on the detail screen
- assertVisible: "Updated Scarf"
- assertVisible: "of 120 rows"

# Go back and verify the list reflects the change
# (iOS back button shows previous screen's navigationTitle)
- tapOn: "Knit Note"
- assertVisible: "Updated Scarf"
