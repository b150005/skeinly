appId: io.github.b150005.knitnote.android
name: "P1 - Search & Filter Projects"
tags:
  - p1
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Create two projects
- tapOn:
    id: "createProjectFab"
- tapOn: "Project Name"
- inputText: "Wool Scarf"
- tapOn: "Total Rows (optional)"
- inputText: "10"
- tapOn: "Create"
- assertVisible: "Wool Scarf"

- tapOn:
    id: "createProjectFab"
- tapOn: "Project Name"
- inputText: "Cotton Hat"
- tapOn: "Create"
- assertVisible: "Cotton Hat"

# Start working on the first project so it becomes "In Progress"
- tapOn: "Wool Scarf"
- tapOn:
    id: "incrementButton"
- tapOn:
    id: "backButton"

# Both projects should be visible
- assertVisible: "Wool Scarf"
- assertVisible: "Cotton Hat"

# --- Search ---
# Phase 33.1.3 migration changed the placeholder from "Search projects..." (ASCII)
# to "Search projects…" (U+2026) per the i18n-convention ellipsis style
# (matches state_loading). Tap via the stable `searchField` testTag so the
# flow stays locale-independent.
- tapOn:
    id: "searchField"
- inputText: "Wool"

# Only matching project should be visible
- assertVisible: "Wool Scarf"
- assertNotVisible: "Cotton Hat"

# Clear search via the clear button (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "clearSearchButton"
- assertVisible: "Wool Scarf"
- assertVisible: "Cotton Hat"

# --- Filter: In Progress --- (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "filterInProgressChip"
- assertVisible: "Wool Scarf"
- assertNotVisible: "Cotton Hat"

# --- Filter: Not Started ---
- tapOn:
    id: "filterNotStartedChip"
- assertNotVisible: "Wool Scarf"
- assertVisible: "Cotton Hat"

# --- Filter: All ---
- tapOn:
    id: "filterAllChip"
- assertVisible: "Wool Scarf"
- assertVisible: "Cotton Hat"
