appId: io.github.b150005.knitnote.android
name: "P1 - Discovery Browse"
tags:
  - p1
  - android
  - requires-supabase
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# Navigate to Discovery screen (content description still resolves in English
# while ProjectListScreen is i18n'd; the screen we land on is asserted via
# testTag below so it stays locale-independent).
- tapOn:
    text: "Discover Patterns"
- assertVisible:
    id: "discoveryScreen"

# Verify search field is present
- assertVisible:
    id: "discoverySearchField"

# Interact with search
- tapOn:
    id: "discoverySearchField"
- inputText: "test"

# Clear search (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "clearSearchButton"

# Interact with difficulty filter via testTag (locale-independent)
- tapOn:
    id: "difficultyBeginnerChip"

# Reset filter to All
- tapOn:
    id: "difficultyAllChip"

# Back navigation (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible: "Knit Note"
