appId: io.github.b150005.skeinly
name: "P1 - Discovery Browse"
tags:
  - p1
  - android
  - requires-supabase
---
# Pre-condition: clean state
- clearState: io.github.b150005.skeinly
- launchApp:
    appId: io.github.b150005.skeinly

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible:
    id: "createProjectFab"

# Navigate to Discovery screen via the overflow menu (Sprint A — Discover is
# now an entry inside the single `MoreVert` menu rather than a top-level icon).
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "discoverPatternsButton"
- assertVisible:
    id: "discoveryScreen"

# Verify search field is present
- assertVisible:
    id: "discoverySearchField"

# Interact with search
- tapOn:
    id: "discoverySearchField"
- inputText: "test"

# Clear search (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "clearSearchButton"

# Interact with difficulty filter via testTag (locale-independent)
- tapOn:
    id: "difficultyBeginnerChip"

# Reset filter to All
- tapOn:
    id: "difficultyAllChip"

# Back navigation (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible:
    id: "createProjectFab"
