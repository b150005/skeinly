appId: io.github.b150005.knitnote
name: "P2 - Screen Navigation"
tags:
  - p2
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible:
    id: "createProjectFab"

# --- Navigate to Profile ---
# Sprint A: ProjectList nav now lives behind a single overflow `MoreVert`
# menu (8 nav entries collapsed to declutter the AppBar). Open the menu first,
# then tap the entry's testTag. Testtags propagate through the popup window
# via `dialogTestTagsAsResourceId()` (Phase 33.4 helper, reused for DropdownMenu).
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "profileButton"
- assertVisible:
    id: "profileScreen"

# Go back to project list (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible:
    id: "createProjectFab"

# --- Navigate to Settings ---
# Sprint A: same overflow-menu pivot as Profile above.
- tapOn:
    id: "moreMenu"
- tapOn:
    id: "settingsButton"
- assertVisible:
    id: "settingsScreen"

# Go back to project list (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible:
    id: "createProjectFab"

# --- Navigate to Project Detail and back ---
# Create a project first (dialog ids locale-independent, Phase 33.4)
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "Nav Test"
- tapOn:
    id: "createProjectButton"
- assertVisible: "Nav Test"

# Go to detail
- tapOn: "Nav Test"
- assertVisible:
    id: "rowCounter"

# Go back (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible:
    id: "createProjectFab"
- assertVisible: "Nav Test"
