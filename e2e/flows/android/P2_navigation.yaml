appId: io.github.b150005.knitnote.android
name: "P2 - Screen Navigation"
tags:
  - p2
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# --- Navigate to Profile ---
# Route through testTags — the contentDescription/title resolve through i18n
# ("プロフィール" on ja), so string selectors drift with locale.
- tapOn:
    id: "profileButton"
- assertVisible:
    id: "profileScreen"

# Go back to project list
- tapOn:
    text: "Back"
- assertVisible: "Knit Note"

# --- Navigate to Settings ---
- tapOn:
    text: "Settings"
- assertVisible: "Settings"

# Go back to project list
- tapOn:
    text: "Back"
- assertVisible: "Knit Note"

# --- Navigate to Project Detail and back ---
# Create a project first
- tapOn:
    id: "createProjectFab"
- tapOn: "Project Name"
- inputText: "Nav Test"
- tapOn: "Create"
- assertVisible: "Nav Test"

# Go to detail
- tapOn: "Nav Test"
- assertVisible:
    id: "rowCounter"

# Go back
- tapOn:
    text: "Back"
- assertVisible: "Knit Note"
- assertVisible: "Nav Test"
