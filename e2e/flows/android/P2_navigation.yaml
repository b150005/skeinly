appId: io.github.b150005.knitnote
name: "P2 - Screen Navigation"
tags:
  - p2
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# --- Navigate to Profile ---
# Route through testTags — the contentDescription/title resolve through i18n
# ("プロフィール" on ja), so string selectors drift with locale.
- tapOn:
    id: "profileButton"
- assertVisible:
    id: "profileScreen"

# Go back to project list (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible: "Knit Note"

# --- Navigate to Settings ---
# Route through testTags — the title/contentDescription resolve through i18n
# ("設定" on ja), so string selectors drift with locale.
- tapOn:
    id: "settingsButton"
- assertVisible:
    id: "settingsScreen"

# Go back to project list (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible: "Knit Note"

# --- Navigate to Project Detail and back ---
# Create a project first (dialog ids locale-independent, Phase 33.4)
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "Nav Test"
- tapOn:
    id: "createProjectButton"
- assertVisible: "Nav Test"

# Go to detail
- tapOn: "Nav Test"
- assertVisible:
    id: "rowCounter"

# Go back (testTag — locale-independent, Phase 33.2)
- tapOn:
    id: "backButton"
- assertVisible: "Knit Note"
- assertVisible: "Nav Test"
