appId: io.github.b150005.skeinly
name: "P1 - Edit Project Title & Total Rows"
tags:
  - p1
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.skeinly
- launchApp:
    appId: io.github.b150005.skeinly

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Create a project to edit (FAB + dialog ids all locale-independent after Phase 33.4)
- assertVisible:
    id: "createProjectFab"
- tapOn:
    id: "createProjectFab"
- tapOn:
    id: "projectNameInput"
- inputText: "OldName"
- tapOn:
    id: "totalRowsInput"
- inputText: "50"
- tapOn:
    id: "createProjectButton"

# Navigate to project detail
- assertVisible: "OldName"
- tapOn: "OldName"

# Verify detail screen loaded (testTag-backed sync point)
- assertVisible:
    id: "rowCounter"

# Tap the edit button via testTag (locale-independent, Phase 33.2)
- tapOn:
    id: "editProjectButton"

# Verify the edit dialog opens (landmark id — Phase 33.4 semantics spike makes
# testTags inside the dialog window resolve as Android resource-ids).
- assertVisible:
    id: "editProjectDialog"

# Clear and update the title
- tapOn:
    id: "projectNameInput"
- eraseText: 100
- inputText: "Updated Scarf"

# Clear and update total rows
- tapOn:
    id: "totalRowsInput"
- eraseText: 100
- inputText: "120"

# Save changes
- tapOn:
    id: "saveButton"

# Verify updated title is displayed on the detail screen.
# Phase E2E hardening (2026-05-06): id+regex match keeps the "120 rows
# was wired" check while staying independent of simulator locale —
# en-US renders "of 120 rows", ja-JP renders "全 120 行". The numeric
# 120 is the load-bearing assertion (proves the eraseText/inputText
# round-trip landed); the surrounding chrome is incidental.
- assertVisible: "Updated Scarf"
- assertVisible:
    id: "rowTotalLabel"
    text: ".*120.*"

# Go back and verify the list reflects the change (testTag — locale-independent)
- tapOn:
    id: "backButton"
- assertVisible: "Updated Scarf"
