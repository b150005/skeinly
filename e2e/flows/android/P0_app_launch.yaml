appId: io.github.b150005.knitnote.android
name: "P0 - App Launch & Project List"
tags:
  - p0
  - android
---
# Pre-condition: clear app state for test isolation
- clearState: io.github.b150005.knitnote.android

# Launch the app (local-only mode — first run shows onboarding)
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify the app bar title is visible (app_name is "Knit Note" in all locales)
- assertVisible: "Knit Note"

# Verify project-list landmark (empty-state text and CTA label are now
# i18n-resolved via CMP resources, so use the stable FAB testTag instead —
# the FAB is always visible on ProjectList regardless of empty/non-empty)
- assertVisible:
    id: "createProjectFab"
