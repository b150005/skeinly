appId: io.github.b150005.skeinly
name: "P0 - App Launch & Project List"
tags:
  - p0
  - android
---
# Pre-condition: clear app state for test isolation
- clearState: io.github.b150005.skeinly

# Launch the app (local-only mode — first run shows onboarding)
- launchApp:
    appId: io.github.b150005.skeinly

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify project-list landmark — Sprint A removed the brand title from the
# AppBar (the wordmark conveys no information once the user is in the app and
# was forcing the title to wrap one letter per line on Android). The FAB
# testTag is the stable locale-independent landmark for "I'm on ProjectList".
- assertVisible:
    id: "createProjectFab"
