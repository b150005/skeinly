appId: ${APP_ID}
name: "P0 - Onboarding Flow"
tags:
  - p0
  - android
---
# Pre-condition: clear app state for test isolation
- clearState: ${APP_ID}

# Launch the app — first run shows onboarding
- launchApp:
    appId: ${APP_ID}

# Verify page 1 via locale-independent testTag
- assertVisible:
    id: "onboardingPage1"

# Verify Skip button is present
- assertVisible:
    id: "skipButton"

# Swipe to page 2
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage2"

# Swipe to page 3
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage3"

# Phase 39.4: beta builds add a 4th diagnostic-consent page; current
# `version.properties` `0.1.0` (semver major == 0) triggers
# `BuildFlags.isBeta == true`. Drop this stanza at v1.0 GA (major == 1).
- swipe:
    direction: LEFT
    duration: 400

- assertVisible:
    id: "onboardingPage4"

# Verify "Get Started" button appears on last page
- assertVisible:
    id: "getStartedButton"

# Tap "Get Started" to complete onboarding
- tapOn:
    id: "getStartedButton"

# Verify we landed on ProjectList (app_name identical across locales;
# FAB testTag is a locale-independent landmark now that empty-state text is i18n'd)
- assertVisible:
    id: "createProjectFab"
- assertVisible:
    id: "createProjectFab"

# Relaunch the app — onboarding should NOT appear again
- stopApp: ${APP_ID}
- launchApp:
    appId: ${APP_ID}

# Should go directly to ProjectList — no onboarding page visible
- assertVisible:
    id: "createProjectFab"
- assertNotVisible:
    id: "onboardingPage1"
