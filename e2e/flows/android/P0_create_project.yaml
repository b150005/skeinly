appId: io.github.b150005.knitnote.android
name: "P0 - Create Project"
tags:
  - p0
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Wait for the empty state
- assertVisible: "No projects yet"

# Tap the FAB to open create dialog
- tapOn:
    id: "createProjectFab"

# Verify the dialog opens
- assertVisible: "New Project"

# Enter project name (tap label text — dialog renders in a separate window
# so testTag-based ids are not accessible via testTagsAsResourceId)
- tapOn: "Project Name"
- inputText: "My Test Scarf"

# Enter total rows
- tapOn: "Total Rows (optional)"
- inputText: "100"

# Tap Create
- tapOn: "Create"

# Verify the project appears in the list
- assertVisible: "My Test Scarf"
- assertVisible: "Not Started"

# Verify empty state is gone
- assertNotVisible: "No projects yet"
