appId: io.github.b150005.knitnote
name: "P0 - Create Project"
tags:
  - p0
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote
- launchApp:
    appId: io.github.b150005.knitnote

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Wait for the list screen (FAB testTag is locale-independent)
- assertVisible:
    id: "createProjectFab"

# Tap the FAB to open create dialog
- tapOn:
    id: "createProjectFab"

# Verify the dialog opens (landmark id — Phase 33.4 closes the cross-window
# testTag gap by applying `.semantics { testTagsAsResourceId = true }` inside
# the AlertDialog composable; all descendant testTags now resolve as Android
# resource-ids, enabling locale-independent `id:` selectors.)
- assertVisible:
    id: "newProjectDialog"

# Enter project name
- tapOn:
    id: "projectNameInput"
- inputText: "My Test Scarf"

# Enter total rows
- tapOn:
    id: "totalRowsInput"
- inputText: "100"

# Tap Create (dialog confirm button)
- tapOn:
    id: "createProjectButton"

# Verify the project appears in the list (user-entered title is locale-independent)
- assertVisible: "My Test Scarf"
