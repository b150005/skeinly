appId: io.github.b150005.knitnote.android
name: "P1 - Symbol Gallery (Phase 30.1)"
tags:
  - p1
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# Open the Symbol Dictionary from the top bar
- tapOn:
    id: "symbolGalleryButton"
- assertVisible: "Symbol Dictionary"

# Grid should be present
- assertVisible:
    id: "symbolGalleryGrid"

# At least one JIS knit glyph card should be laid out after first render.
# Assert via testTag (sanitized: dots/dashes → underscores so
# `testTagsAsResourceId = true` can round-trip through Android resource ids).
# Wait a few seconds — LazyVerticalGrid items compose asynchronously on a
# cold emulator start, so the first-render visibility race is real.
- extendedWaitUntil:
    visible:
      id: "symbolCard_jis_knit_k"
    timeout: 10000

# Scroll through the grid to exercise rendering of further cells
- scroll
- scroll

# Back navigation
- tapOn:
    text: "Back"
- assertVisible: "Knit Note"
