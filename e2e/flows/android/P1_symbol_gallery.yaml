appId: io.github.b150005.knitnote.android
name: "P1 - Symbol Gallery (Phase 30.1)"
tags:
  - p1
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Verify we start on the project list
- assertVisible: "Knit Note"

# Open the Symbol Dictionary from the top bar
- tapOn:
    id: "symbolGalleryButton"
- assertVisible: "Symbol Dictionary"

# Grid container should be present. Per-card testTags on LazyVerticalGrid
# children are not reliably exposed through the Compose accessibility tree
# on the CI emulator (verified across three CI runs), so the smoke flow
# asserts only the grid container + that scrolling does not crash the app.
- assertVisible:
    id: "symbolGalleryGrid"

# Exercise rendering by scrolling — 35 symbol cards each run a Canvas draw,
# so a crash here would catch drawing-pipeline regressions.
- scroll
- scroll

# Back navigation
- tapOn:
    text: "Back"
- assertVisible: "Knit Note"
