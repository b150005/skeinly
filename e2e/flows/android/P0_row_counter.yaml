appId: io.github.b150005.knitnote.android
name: "P0 - Row Counter Increment/Decrement"
tags:
  - p0
  - android
---
# Pre-condition: clean state
- clearState: io.github.b150005.knitnote.android
- launchApp:
    appId: io.github.b150005.knitnote.android

# Complete onboarding on fresh install
- runFlow: ../../helpers/complete_onboarding_android.yaml

# Wait for list screen to be ready (FAB testTag is locale-independent)
- assertVisible:
    id: "createProjectFab"

# Create a project first (dialog renders in a separate window,
# so testTag-based ids are not accessible — use text selectors instead)
- tapOn:
    id: "createProjectFab"
- tapOn: "Project Name"
- inputText: "Counter Test"
- tapOn: "Total Rows (optional)"
- inputText: "10"
- tapOn: "Create"

# Wait for project to appear in list
- assertVisible: "Counter Test"

# Navigate to project detail
- tapOn: "Counter Test"

# Verify initial state
- assertVisible:
    id: "rowCounter"

# Increment 3 times
- tapOn:
    id: "incrementButton"
- tapOn:
    id: "incrementButton"
- tapOn:
    id: "incrementButton"

# Verify counter shows 3 (counter is a separate Text with testTag "rowCounter")
- assertVisible: "3"
# Row-total label is testTag-based after Phase 33.1.12 i18n ("of 10 rows" / "全 10 行")
- assertVisible:
    id: "rowTotalLabel"

# Status changes to In Progress when currentRow > 0 and < totalRows (domain rule).
# Using a locale-independent testTag — rendered text is "In Progress" / "進行中".
- assertVisible:
    id: "projectStatusLabel"

# Decrement once
- tapOn:
    id: "decrementButton"

# Verify counter shows 2
- assertVisible: "2"
- assertVisible:
    id: "rowTotalLabel"
