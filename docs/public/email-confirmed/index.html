<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - Skeinly</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">
  <meta property="og:image" content="../og.png">
  <style>
    :root {
      --color-bg: #faf9f7;
      --color-text: #2d2a26;
      --color-accent: #7B61FF;
      --color-success: #2e8b57;
      --color-muted: #6b6560;
      --color-border: #e8e4df;
      --max-width: 520px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.7;
      padding: 4rem 1.5rem 4rem;
      min-height: 100vh;
    }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      text-align: center;
    }

    .lang-switch {
      text-align: right;
      margin-bottom: 2rem;
      font-size: 0.85rem;
    }

    .check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--color-success);
      color: #fff;
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--color-muted);
      margin-bottom: 0.75rem;
    }

    .next-step {
      margin-top: 2rem;
      padding: 1.25rem 1.5rem;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      text-align: left;
    }

    .next-step h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .next-step ol {
      margin-left: 1.25rem;
      color: var(--color-text);
    }

    .next-step li {
      margin-bottom: 0.35rem;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .footer-links {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--color-muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="lang-switch">
      <a href="../ja/email-confirmed/">日本語</a>
    </div>

    <div class="check" aria-hidden="true">&#10003;</div>

    <h1>Email confirmed</h1>
    <p>Your Skeinly account email address has been verified.</p>

    <div class="next-step">
      <h2>Next step</h2>
      <ol>
        <li>Return to the Skeinly app on your device.</li>
        <li>Open the sign-in screen.</li>
        <li>Enter the same email and password you used to sign up.</li>
        <li>Tap <strong>Sign in</strong>.</li>
      </ol>
    </div>

    <div class="footer-links">
      <a href="../privacy-policy/">Privacy Policy</a> &middot;
      <a href="../terms-of-service/">Terms of Service</a> &middot;
      <a href="../help/">Help</a>
    </div>
  </main>
</body>
</html>
