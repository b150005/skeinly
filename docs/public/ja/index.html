<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knit Note</title>
  <meta name="description" content="iOS と Android に対応した編み図管理アプリ。">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">
  <meta property="og:title" content="Knit Note">
  <meta property="og:description" content="iOS と Android に対応した編み図管理アプリ。">
  <meta property="og:image" content="../og.png">
  <meta property="og:type" content="website">
  <style>
    :root {
      --color-bg: #faf9f7;
      --color-text: #2d2a26;
      --color-accent: #7B61FF;
      --color-muted: #6b6560;
      --color-border: #e8e4df;
      --max-width: 680px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.8;
      padding: 2rem 1.5rem 4rem;
    }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 2rem 0 3rem;
    }

    .hero img {
      width: 96px;
      height: 96px;
      border-radius: 22%;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--color-muted);
      font-size: 1.05rem;
      margin-bottom: 0;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--color-border);
    }

    p { margin-bottom: 0.75rem; }

    ul.links {
      list-style: none;
      margin-left: 0;
      margin-top: 0.5rem;
    }

    ul.links li {
      margin-bottom: 0.5rem;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover { text-decoration: underline; }

    .lang-switch {
      text-align: right;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .footer-note {
      margin-top: 3rem;
      color: var(--color-muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <div class="lang-switch">
      <a href="../">English</a>
    </div>

    <section class="hero">
      <img src="../apple-touch-icon.png" alt="Knit Note アプリアイコン">
      <h1>Knit Note</h1>
      <p class="tagline">iOS と Android に対応した編み図管理アプリ。</p>
    </section>

    <h2>法的情報</h2>
    <ul class="links">
      <li><a href="privacy-policy/">プライバシーポリシー</a></li>
      <li><a href="terms-of-service/">利用規約</a></li>
    </ul>

    <h2>プロジェクト</h2>
    <ul class="links">
      <li><a href="https://github.com/b150005/knit-note">GitHub のソースコード</a></li>
    </ul>

    <p class="footer-note">&copy; 2026 Knit Note &middot; <a href="mailto:knitnote.app@gmail.com">knitnote.app@gmail.com</a></p>
  </main>
</body>
</html>
