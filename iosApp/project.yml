name: iosApp
options:
  bundleIdPrefix: io.github.b150005.skeinly
  deploymentTarget:
    # 17.2 matches the iOS-simulator version Kotlin/Native bundles its
    # libicu.icudtl with; pinning to 17.0 produced a "object file built
    # for newer iOS-simulator (17.2) than being linked (17.0)" linker
    # warning at every iOS build. Bumped to 17.2 — released Dec 2023, so
    # the user-base impact of the floor lift is negligible.
    iOS: "17.2"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

# Phase F1 — Sentry-Cocoa via SwiftPM. The DSN itself is injected into
# Info.plist via local.xcconfig (SENTRY_DSN_IOS) and read at runtime by
# iOSApp.swift; empty DSN means Sentry init is skipped (local-only mode).
# Phase F2 — PostHog-iOS via SwiftPM. API key + host injected into
# Info.plist via local.xcconfig (POSTHOG_API_KEY / POSTHOG_HOST). Init
# also gated on the user's analytics opt-in toggle (Settings).
# Phase 39.1 — Supabase URL + Publishable key are injected into Info.plist
# (SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY) and consumed by
# SupabaseConfig.ios.kt via NSBundle.mainBundle.objectForInfoDictionaryKey.
# Empty values mean local-only mode (no Supabase round-trips, no Realtime
# sync). Production CI (release.yml) and main-branch CI (ci.yml) must
# pass real values via fastlane build_xcargs / xcodebuild xcargs
# respectively. The e2e workflow intentionally passes empty strings to
# exercise the local-only code path. The legacy `anon` JWT key is
# deprecated by Supabase (2025-11-01) — only `sb_publishable_…` values
# should be passed in.
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.30.0"
  # Phase 41.3 (ADR-016 §6 §41.3) — RevenueCat KMP shared module references
  # `Purchases.sharedInstance` from `purchases-kmp-core`, which on iOS bridges
  # to the `PurchasesHybridCommon` ObjC framework. The Shared.framework
  # depends on PurchasesHybridCommon symbols at link time, so the iosApp must
  # link this SwiftPM dependency for the framework's references to resolve.
  # Version pinned to match the underlying purchases-ios 5.x release that
  # ships alongside purchases-kmp-core 2.10.x.
  PurchasesHybridCommon:
    url: https://github.com/RevenueCat/purchases-hybrid-common
    from: "17.55.1"

configFiles:
  Debug: local.xcconfig
  Release: local.xcconfig
settings:
  base:
    # DEVELOPMENT_TEAM is injected by local.xcconfig (developer local
    # builds use their personal team; CI release builds use the CI-written
    # xcconfig with the project's team ID). Empty here so xcodegen
    # generates the project with the xcconfig reference intact rather
    # than baking a literal team into the .xcodeproj.
    DEVELOPMENT_TEAM: ""
  # Phase 39 (W3 / 2026-05-11) — manual signing for Release archives.
  # Without these settings, xcodegen generates a Release configuration
  # with `CODE_SIGN_STYLE = Automatic` (the Xcode default), and the
  # archive step fails with "Select a provisioning profile in the
  # Signing & Capabilities editor" because automatic signing can't
  # resolve a profile in a CI environment without an interactive login
  # to Apple Developer Portal. fastlane's `signingStyle: "manual"` in
  # export_options only governs the export step (archive → IPA); the
  # ARCHIVE step itself reads these build settings from the .xcodeproj.
  #
  # PROVISIONING_PROFILE_SPECIFIER must match the profile's "Name"
  # field in Apple Developer Portal — sigh fetches by this name and
  # the archive step locates the keychain-installed profile by the
  # same name. Currently "Skeinly App Store" (immutable for the
  # lifetime of the App Store listing).
  #
  # Debug stays at Automatic so local developer builds onto a
  # simulator / personal device don't require manual profile setup.
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Apple Distribution"
      PROVISIONING_PROFILE_SPECIFIER: "Skeinly App Store"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: "Skeinly"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: "en"
        CFBundleLocalizations:
          - en
          - ja
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CADisableMinimumFrameDurationOnPhone: true
        # Phase F1 — Sentry DSN injected from xcconfig via build setting.
        # Empty value means no Sentry init (local-only mode).
        SENTRY_DSN_IOS: "$(SENTRY_DSN_IOS)"
        # Phase F2 — PostHog API key + host. Empty key means no PostHog
        # init. Even with a key configured, init is also gated on the
        # user's analytics opt-in toggle (Settings). Default host is the
        # public US cloud; override via xcconfig for self-hosted.
        POSTHOG_API_KEY: "$(POSTHOG_API_KEY)"
        POSTHOG_HOST: "$(POSTHOG_HOST)"
        # Phase 39.1 — Supabase backend URL + Publishable key
        # (`sb_publishable_…` form, post-2025-11-01). Empty values disable
        # Supabase init in SupabaseConfig.ios.kt (local-only mode).
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_PUBLISHABLE_KEY: "$(SUPABASE_PUBLISHABLE_KEY)"
        # Phase 41.3 (ADR-016 §6 §41.3) — RevenueCat Public iOS SDK Key
        # injected from xcconfig REVENUECAT_API_KEY (vendor-setup §19).
        # Empty value means RevenueCatConfig.isConfigured = false ⇒
        # RevenueCatBootstrap.configure short-circuits with no SDK init,
        # paywall surfaces "subscriptions unavailable in this build".
        REVENUECAT_API_KEY: "$(REVENUECAT_API_KEY)"
        # Phase 39.2 — Build-flavor flag exposed to runtime via Info.plist.
        # The xcconfig macro IS_BETA (set in `settings.base` below) is
        # substituted as a literal string ("YES" / "NO") here. iOS
        # consumers (`BuildFlags.ios.kt`, `Core/BuildFlags.swift`) read
        # this key and compare to "YES" — Info.plist string-typed booleans
        # do not auto-convert to NSNumber when accessed via
        # `objectForInfoDictionaryKey`. Drives the F2 (ADR-015) bug
        # reporter gating on iOS.
        IsBetaBuild: "$(IS_BETA)"
        # TestFlight auto-upload — Export Compliance pre-declaration.
        # App Store Connect requires every build to answer "does the app
        # use encryption?" before being available to TestFlight testers.
        # The default per-build interactive prompt blocks unattended CI
        # uploads; pre-declaring this key as `false` means Apple records
        # "uses only standard OS-provided HTTPS encryption" once and
        # applies it to every build automatically — no per-build user
        # action.
        #
        # Truthfulness: Skeinly uses ONLY (a) HTTPS via Ktor + Apple
        # native URLSession (Apple OS-provided TLS) and (b) Apple's
        # built-in keychain encryption. No bundled third-party crypto
        # library, no custom cryptographic primitive. This qualifies for
        # the U.S. Bureau of Industry and Security (BIS) self-classification
        # exemption under EAR 740.17(b)(1) — the "uses only encryption
        # in the operating system" exemption — so the `false` declaration
        # is accurate, not a workaround. References:
        #   https://developer.apple.com/documentation/security/complying_with_encryption_export_regulations
        #   https://www.bis.doc.gov/index.php/policy-guidance/encryption
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: SystemBackground
        CFBundleURLTypes:
          - CFBundleURLName: "io.github.b150005.skeinly.share"
            CFBundleURLSchemes:
              - skeinly
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        # Versioning per agent-team deliberation 2026-05-05: pre-1.0 closed
        # beta uses semver `0.X.Y` (major==0 = pre-stable API). Hyphen-
        # suffixed prerelease identifiers (e.g. `1.0.0-beta1`) are deliberately
        # avoided because `CFBundleShortVersionString` accepts only digits and
        # dots — xcrun altool / App Store Connect reject hyphen suffix at
        # upload. CURRENT_PROJECT_VERSION restarts at 1 because it must be
        # strictly increasing only within a given MARKETING_VERSION stream;
        # changing MARKETING_VERSION starts a fresh stream.
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.b150005.skeinly
        # Phase 39.2 — F2 build-flavor flag. "YES" while MARKETING_VERSION
        # has major==0 (pre-stable); flip to "NO" alongside the v1.0 GA
        # version bump (Phase 40). Consumed via the `IsBetaBuild`
        # Info.plist key — see the `info.properties` block above. The
        # xcconfig substitutes the literal string verbatim, so the plist
        # entry is `<string>YES</string>` not `<true/>` (Apple's xcconfig
        # → plist substitution does not perform type coercion).
        IS_BETA: "YES"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-ObjC"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sprint A: brand accent #7B61FF — sourced from
        # `iosApp/Assets.xcassets/AccentColor.colorset/`. SwiftUI auto-tints
        # primary actions (toolbar buttons, swipe-action accents, links,
        # focus rings) with this color across the entire app.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Phase 24.2e (ADR-017 §3.5) — APNs entitlement. The bundled
        # `iosApp/iosApp.entitlements` declares `aps-environment =
        # production` so TestFlight + App Store builds attach to the
        # production APNs gateway. The Distribution Provisioning Profile
        # in `APPLE_PROVISIONING_PROFILE_BASE64` must include the Push
        # Notifications capability for the App ID, otherwise
        # `xcodebuild archive` reports a code-sign mismatch.
        CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
      # Phase 39 (W4 / 2026-05-11) — target-level Release signing settings.
      # The Path Y v4 archive failure (run 25650644594 / 25651605096)
      # diagnosed via the new ios-failure-diagnostics artifact bundle
      # showed that xcodegen bakes the default `CODE_SIGN_IDENTITY =
      # "iPhone Developer"` (= iOS Development) into the iosApp
      # *target-level* Release XCBuildConfiguration when this `configs`
      # block is absent. Xcode's build-settings hierarchy places
      # target-level above project-level, so the project-level
      # `settings.configs.Release.CODE_SIGN_IDENTITY = "Apple
      # Distribution"` was silently overridden — signing analyzer asked
      # for a development cert that doesn't exist in the CI keychain
      # ("No 'iOS Development' signing certificate matching team ID
      # L9ZR4679P5 was found").
      #
      # Re-asserting the same Release-only signing trio at the target
      # level forces xcodegen to write them directly into the iosApp
      # target's Release XCBuildConfiguration, making them the highest-
      # priority value (modulo xcargs). Debug stays Automatic for local
      # simulator builds.
      #
      # The project-level `settings.configs.Release` block above is
      # retained because it serves as the value applied to PBXProject's
      # XCBuildConfiguration (visible in Xcode → Project → Info →
      # Configurations, used as the inheritance base for any future
      # signed target). It is no longer load-bearing for iosApp, which
      # this block fully overrides.
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Skeinly App Store"
    dependencies:
      - framework: "../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework"
        embed: false
      - sdk: libsqlite3.tbd
      - package: Sentry
        product: Sentry
      - package: PostHog
        product: PostHog
      - package: PurchasesHybridCommon
        product: PurchasesHybridCommon
      - package: PurchasesHybridCommon
        product: RevenueCat
    preBuildScripts:
      - name: "Compile Shared Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iosAppTests
      # Include Core utilities for unit tests. Files that import Shared framework
      # must be excluded since iosAppTests does not link Shared.framework.
      # Core/ holds Foundation-only utilities testable without Shared.framework.
      # Files that import Shared live under Core/Bridging/ and are deliberately
      # excluded — iosAppTests does not link Shared.framework. See
      # docs/en/ops/repo-policy.md (or this commit) for the convention rationale.
      - path: iosApp/Core
        excludes:
          - "Bridging"
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iosAppUITests
    dependencies:
      - target: iosApp
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppTests: [test]
        iosAppUITests: [test]
    test:
      targets:
        - iosAppTests
        - iosAppUITests
