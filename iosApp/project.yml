name: iosApp
options:
  bundleIdPrefix: io.github.b150005.skeinly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

# Phase F1 — Sentry-Cocoa via SwiftPM. The DSN itself is injected into
# Info.plist via local.xcconfig (SENTRY_DSN_IOS) and read at runtime by
# iOSApp.swift; empty DSN means Sentry init is skipped (local-only mode).
# Phase F2 — PostHog-iOS via SwiftPM. API key + host injected into
# Info.plist via local.xcconfig (POSTHOG_API_KEY / POSTHOG_HOST). Init
# also gated on the user's analytics opt-in toggle (Settings).
# Phase 39.1 — Supabase URL + Publishable key are injected into Info.plist
# (SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY) and consumed by
# SupabaseConfig.ios.kt via NSBundle.mainBundle.objectForInfoDictionaryKey.
# Empty values mean local-only mode (no Supabase round-trips, no Realtime
# sync). Production CI (release.yml) and main-branch CI (ci.yml) must
# pass real values via fastlane build_xcargs / xcodebuild xcargs
# respectively. The e2e workflow intentionally passes empty strings to
# exercise the local-only code path. The legacy `anon` JWT key is
# deprecated by Supabase (2025-11-01) — only `sb_publishable_…` values
# should be passed in.
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.30.0"

configFiles:
  Debug: local.xcconfig
  Release: local.xcconfig
settings:
  base:
    DEVELOPMENT_TEAM: ""

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: "Skeinly"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: "en"
        CFBundleLocalizations:
          - en
          - ja
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CADisableMinimumFrameDurationOnPhone: true
        # Phase F1 — Sentry DSN injected from xcconfig via build setting.
        # Empty value means no Sentry init (local-only mode).
        SENTRY_DSN_IOS: "$(SENTRY_DSN_IOS)"
        # Phase F2 — PostHog API key + host. Empty key means no PostHog
        # init. Even with a key configured, init is also gated on the
        # user's analytics opt-in toggle (Settings). Default host is the
        # public US cloud; override via xcconfig for self-hosted.
        POSTHOG_API_KEY: "$(POSTHOG_API_KEY)"
        POSTHOG_HOST: "$(POSTHOG_HOST)"
        # Phase 39.1 — Supabase backend URL + Publishable key
        # (`sb_publishable_…` form, post-2025-11-01). Empty values disable
        # Supabase init in SupabaseConfig.ios.kt (local-only mode).
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_PUBLISHABLE_KEY: "$(SUPABASE_PUBLISHABLE_KEY)"
        UILaunchScreen:
          UIColorName: SystemBackground
        CFBundleURLTypes:
          - CFBundleURLName: "io.github.b150005.skeinly.share"
            CFBundleURLSchemes:
              - skeinly
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        MARKETING_VERSION: "1.0.0-beta1"
        CURRENT_PROJECT_VERSION: "2"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.b150005.skeinly
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-ObjC"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sprint A: brand accent #7B61FF — sourced from
        # `iosApp/Assets.xcassets/AccentColor.colorset/`. SwiftUI auto-tints
        # primary actions (toolbar buttons, swipe-action accents, links,
        # focus rings) with this color across the entire app.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - framework: "../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework"
        embed: false
      - sdk: libsqlite3.tbd
      - package: Sentry
        product: Sentry
      - package: PostHog
        product: PostHog
    preBuildScripts:
      - name: "Compile Shared Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iosAppTests
      # Include Core utilities for unit tests. Files that import Shared framework
      # must be excluded since iosAppTests does not link Shared.framework.
      # Core/ holds Foundation-only utilities testable without Shared.framework.
      # Files that import Shared live under Core/Bridging/ and are deliberately
      # excluded — iosAppTests does not link Shared.framework. See
      # docs/en/repo-policy.md (or this commit) for the convention rationale.
      - path: iosApp/Core
        excludes:
          - "Bridging"
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iosAppUITests
    dependencies:
      - target: iosApp
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppTests: [test]
        iosAppUITests: [test]
    test:
      targets:
        - iosAppTests
        - iosAppUITests
