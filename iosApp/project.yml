name: iosApp
options:
  bundleIdPrefix: io.github.b150005.knitnote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

# Phase F1 — Sentry-Cocoa via SwiftPM. The DSN itself is injected into
# Info.plist via local.xcconfig (SENTRY_DSN_IOS) and read at runtime by
# iOSApp.swift; empty DSN means Sentry init is skipped (local-only mode).
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"

configFiles:
  Debug: local.xcconfig
  Release: local.xcconfig
settings:
  base:
    DEVELOPMENT_TEAM: ""

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: "Knit Note"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: "en"
        CFBundleLocalizations:
          - en
          - ja
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CADisableMinimumFrameDurationOnPhone: true
        # Phase F1 — Sentry DSN injected from xcconfig via build setting.
        # Empty value means no Sentry init (local-only mode).
        SENTRY_DSN_IOS: "$(SENTRY_DSN_IOS)"
        UILaunchScreen:
          UIColorName: SystemBackground
        CFBundleURLTypes:
          - CFBundleURLName: "io.github.b150005.knitnote.share"
            CFBundleURLSchemes:
              - knitnote
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        MARKETING_VERSION: "1.0.0-beta1"
        CURRENT_PROJECT_VERSION: "2"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.b150005.knitnote
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-ObjC"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: "../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework"
        embed: false
      - sdk: libsqlite3.tbd
      - package: Sentry
        product: Sentry
    preBuildScripts:
      - name: "Compile Shared Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iosAppTests
      # Include Core utilities for unit tests. Files that import Shared framework
      # must be excluded since iosAppTests does not link Shared.framework.
      - path: iosApp/Core
        excludes:
          - "ViewModelObserver.swift"
          - "ViewModelFactory.swift"
          - "ScopedViewModel.swift"
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iosAppUITests
    dependencies:
      - target: iosApp
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppTests: [test]
        iosAppUITests: [test]
    test:
      targets:
        - iosAppTests
        - iosAppUITests
