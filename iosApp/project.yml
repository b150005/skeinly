name: iosApp
options:
  bundleIdPrefix: io.github.b150005.skeinly
  deploymentTarget:
    # 17.2 matches the iOS-simulator version Kotlin/Native bundles its
    # libicu.icudtl with; pinning to 17.0 produced a "object file built
    # for newer iOS-simulator (17.2) than being linked (17.0)" linker
    # warning at every iOS build. Bumped to 17.2 â€” released Dec 2023, so
    # the user-base impact of the floor lift is negligible.
    iOS: "17.2"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

# Phase F1 â€” Sentry-Cocoa via SwiftPM. The DSN itself is injected into
# Info.plist via local.xcconfig (SENTRY_DSN_IOS) and read at runtime by
# iOSApp.swift; empty DSN means Sentry init is skipped (local-only mode).
# Phase F2 â€” PostHog-iOS via SwiftPM. API key + host injected into
# Info.plist via local.xcconfig (POSTHOG_API_KEY / POSTHOG_HOST). Init
# also gated on the user's analytics opt-in toggle (Settings).
# Phase 39.1 â€” Supabase URL + Publishable key are injected into Info.plist
# (SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY) and consumed by
# SupabaseConfig.ios.kt via NSBundle.mainBundle.objectForInfoDictionaryKey.
# Empty values mean local-only mode (no Supabase round-trips, no Realtime
# sync). Production CI (release.yml) and main-branch CI (ci.yml) must
# pass real values via fastlane build_xcargs / xcodebuild xcargs
# respectively. The e2e workflow intentionally passes empty strings to
# exercise the local-only code path. The legacy `anon` JWT key is
# deprecated by Supabase (2025-11-01) â€” only `sb_publishable_â€¦` values
# should be passed in.
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.30.0"
  # Phase 41.3 (ADR-016 Â§6 Â§41.3) â€” RevenueCat KMP shared module references
  # `Purchases.sharedInstance` from `purchases-kmp-core`, which on iOS bridges
  # to the `PurchasesHybridCommon` ObjC framework. The Shared.framework
  # depends on PurchasesHybridCommon symbols at link time, so the iosApp must
  # link this SwiftPM dependency for the framework's references to resolve.
  # Version pinned to match the underlying purchases-ios 5.x release that
  # ships alongside purchases-kmp-core 2.10.x.
  PurchasesHybridCommon:
    url: https://github.com/RevenueCat/purchases-hybrid-common
    from: "17.55.1"

configFiles:
  Debug: local.xcconfig
  Release: local.xcconfig
settings:
  base:
    DEVELOPMENT_TEAM: ""

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: "Skeinly"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: "en"
        CFBundleLocalizations:
          - en
          - ja
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CADisableMinimumFrameDurationOnPhone: true
        # Phase F1 â€” Sentry DSN injected from xcconfig via build setting.
        # Empty value means no Sentry init (local-only mode).
        SENTRY_DSN_IOS: "$(SENTRY_DSN_IOS)"
        # Phase F2 â€” PostHog API key + host. Empty key means no PostHog
        # init. Even with a key configured, init is also gated on the
        # user's analytics opt-in toggle (Settings). Default host is the
        # public US cloud; override via xcconfig for self-hosted.
        POSTHOG_API_KEY: "$(POSTHOG_API_KEY)"
        POSTHOG_HOST: "$(POSTHOG_HOST)"
        # Phase 39.1 â€” Supabase backend URL + Publishable key
        # (`sb_publishable_â€¦` form, post-2025-11-01). Empty values disable
        # Supabase init in SupabaseConfig.ios.kt (local-only mode).
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_PUBLISHABLE_KEY: "$(SUPABASE_PUBLISHABLE_KEY)"
        # Phase 41.3 (ADR-016 Â§6 Â§41.3) â€” RevenueCat Public iOS SDK Key
        # injected from xcconfig REVENUECAT_API_KEY (vendor-setup Â§19).
        # Empty value means RevenueCatConfig.isConfigured = false â‡’
        # RevenueCatBootstrap.configure short-circuits with no SDK init,
        # paywall surfaces "subscriptions unavailable in this build".
        REVENUECAT_API_KEY: "$(REVENUECAT_API_KEY)"
        # Phase 39.2 â€” Build-flavor flag exposed to runtime via Info.plist.
        # The xcconfig macro IS_BETA (set in `settings.base` below) is
        # substituted as a literal string ("YES" / "NO") here. iOS
        # consumers (`BuildFlags.ios.kt`, `Core/BuildFlags.swift`) read
        # this key and compare to "YES" â€” Info.plist string-typed booleans
        # do not auto-convert to NSNumber when accessed via
        # `objectForInfoDictionaryKey`. Drives the F2 (ADR-015) bug
        # reporter gating on iOS.
        IsBetaBuild: "$(IS_BETA)"
        UILaunchScreen:
          UIColorName: SystemBackground
        CFBundleURLTypes:
          - CFBundleURLName: "io.github.b150005.skeinly.share"
            CFBundleURLSchemes:
              - skeinly
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        # Versioning per agent-team deliberation 2026-05-05: pre-1.0 closed
        # beta uses semver `0.X.Y` (major==0 = pre-stable API). Hyphen-
        # suffixed prerelease identifiers (e.g. `1.0.0-beta1`) are deliberately
        # avoided because `CFBundleShortVersionString` accepts only digits and
        # dots â€” xcrun altool / App Store Connect reject hyphen suffix at
        # upload. CURRENT_PROJECT_VERSION restarts at 1 because it must be
        # strictly increasing only within a given MARKETING_VERSION stream;
        # changing MARKETING_VERSION starts a fresh stream.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.b150005.skeinly
        # Phase 39.2 â€” F2 build-flavor flag. "YES" while MARKETING_VERSION
        # has major==0 (pre-stable); flip to "NO" alongside the v1.0 GA
        # version bump (Phase 40). Consumed via the `IsBetaBuild`
        # Info.plist key â€” see the `info.properties` block above. The
        # xcconfig substitutes the literal string verbatim, so the plist
        # entry is `<string>YES</string>` not `<true/>` (Apple's xcconfig
        # â†’ plist substitution does not perform type coercion).
        IS_BETA: "YES"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-ObjC"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sprint A: brand accent #7B61FF â€” sourced from
        # `iosApp/Assets.xcassets/AccentColor.colorset/`. SwiftUI auto-tints
        # primary actions (toolbar buttons, swipe-action accents, links,
        # focus rings) with this color across the entire app.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - framework: "../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework"
        embed: false
      - sdk: libsqlite3.tbd
      - package: Sentry
        product: Sentry
      - package: PostHog
        product: PostHog
      - package: PurchasesHybridCommon
        product: PurchasesHybridCommon
      - package: PurchasesHybridCommon
        product: RevenueCat
    preBuildScripts:
      - name: "Compile Shared Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iosAppTests
      # Include Core utilities for unit tests. Files that import Shared framework
      # must be excluded since iosAppTests does not link Shared.framework.
      # Core/ holds Foundation-only utilities testable without Shared.framework.
      # Files that import Shared live under Core/Bridging/ and are deliberately
      # excluded â€” iosAppTests does not link Shared.framework. See
      # docs/en/repo-policy.md (or this commit) for the convention rationale.
      - path: iosApp/Core
        excludes:
          - "Bridging"
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iosAppUITests
    dependencies:
      - target: iosApp
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppTests: [test]
        iosAppUITests: [test]
    test:
      targets:
        - iosAppTests
        - iosAppUITests
