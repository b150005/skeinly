version: 2

# Dependency update automation policy (Phase 39, 2026-05-11 expansion).
#
# Scope = ecosystems where stale lockfiles cause real CI failures + where
# `dependabot` has native ecosystem support. Specifically NOT covered:
#   - Deno / JSR imports in `supabase/functions/**` (no native ecosystem;
#     update manually at Edge Function redeploy cadence).
#   - cargo / pip / npm (not used in this repo).
#
# Safety posture for a solo-maintainer public repo (per Phase 39 security
# audit + agent-team deliberation 2026-05-11):
#   - All ecosystems open weekly PRs (not daily — minimizes review noise).
#   - Major-version bumps are explicitly excluded for packages whose
#     upgrade requires coordinated changes elsewhere (fastlane DSL,
#     PurchasesHybridCommon ↔ purchases-kmp-core Gradle pairing).
#   - Patch + minor updates require the `main-strict` ruleset's CI gate
#     before merge (no Dependabot auto-merge enabled).
#   - The `dependency-review-action` workflow (.github/workflows/dependency-review.yml)
#     runs on every PR and fails on HIGH-severity CVE introductions —
#     catches malicious-patch supply-chain attacks even on Dependabot PRs.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.compose*"
      androidx:
        patterns:
          - "androidx.*"
      koin:
        patterns:
          - "io.insert-koin*"
      supabase:
        patterns:
          - "io.github.jan-tennert.supabase*"

  # Phase 39 (W3 / 2026-05-11) — bundler covers the iOS release pipeline
  # (fastlane + 60+ transitive gems). Today's stale-Gemfile.lock incident
  # (fastlane 2.233.0 stuck while 2.234.0 fixed real CI bugs) was caused
  # by the absence of this ecosystem coverage. Major-version bumps of
  # fastlane itself are ignored because they typically introduce Fastfile
  # DSL changes that need manual review of the Fastfile signing /
  # build_app / upload_to_testflight integration.
  - package-ecosystem: "bundler"
    directory: "/iosApp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ios"
    ignore:
      - dependency-name: "fastlane"
        update-types: ["version-update:semver-major"]

  # Phase 39 (W3 / 2026-05-11) — SwiftPM covers Sentry, PostHog,
  # RevenueCat, PurchasesHybridCommon. The `Package.resolved` file
  # generated by xcodebuild is the actual lockfile dependabot updates.
  # PurchasesHybridCommon major bumps require coordinated Gradle-side
  # update of purchases-kmp-core (per ADR-016 §6) — ignore the major
  # range here to prevent a one-sided PR breaking the iOS link step.
  - package-ecosystem: "swift"
    directory: "/iosApp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ios"
    ignore:
      - dependency-name: "PurchasesHybridCommon"
        update-types: ["version-update:semver-major"]
