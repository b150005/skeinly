name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Weekly Monday 6:17 AM UTC

jobs:
  codeql:
    name: CodeQL Analysis
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            runner: ubuntu-latest
          - language: swift
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    # java-kotlin: CodeQL does not yet support Kotlin 2.3.20 (upstream limit)
    continue-on-error: ${{ matrix.language == 'java-kotlin' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Pre-CodeQL setup (before tracing starts) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Swift: install XcodeGen before CodeQL init to avoid Rosetta conflicts
      - name: Install XcodeGen
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Build shared framework (swift prerequisite)
        if: matrix.language == 'swift'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Create local.xcconfig for CI
        if: matrix.language == 'swift'
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: cd iosApp && xcodegen generate

      # --- CodeQL init (starts tracing) ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # --- Traced builds (after init) ---
      - name: Build (java-kotlin)
        if: matrix.language == 'java-kotlin'
        env:
          GRADLE_OPTS: "-Xmx4g"
        run: >-
          ./gradlew --no-daemon
          -Pkotlin.daemon.enabled=false
          -Dkotlin.compiler.execution.strategy=in-process
          :shared:compileAndroidMain
          :androidApp:compileDebugKotlin

      - name: Resolve iOS Simulator destination
        if: matrix.language == 'swift'
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (swift)
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination '${{ steps.sim.outputs.dest }}' \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
