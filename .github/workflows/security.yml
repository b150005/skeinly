name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Weekly Monday 6:17 AM UTC

# Same concurrency posture as ci.yml + e2e.yml — prevent rapid back-to-back
# pushes from queuing multiple Security runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            runner: ubuntu-latest
            build-mode: manual
          - language: swift
            runner: macos-latest
            build-mode: manual
    runs-on: ${{ matrix.runner }}
    # java-kotlin build target uses `:shared:assembleAndroidMain
    # :androidApp:assembleDebug` rather than `:shared:compileAndroidMain`
    # because the AGP 9 KMP plugin (`com.android.kotlin.multiplatform.library`)
    # implements `compileAndroidMain` as a lifecycle task with no direct
    # kotlinc invocation. The assemble pipeline forces real Kotlin
    # compilation through the dependency graph, giving the CodeQL
    # extractor a kotlinc process to hook. Android-only `assembleAndroidMain`
    # is used (not umbrella `:shared:assemble`) because the latter pulls
    # in iOS-native link tasks that ubuntu-latest cannot satisfy.
    #
    # The overlay-base database warning ("build-mode is set to manual
    # instead of none") is benign — CodeQL falls back to full
    # (non-incremental) analysis.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Pre-CodeQL setup (before tracing starts) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        # Pin to SHA per security audit C2.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # Swift: install XcodeGen before CodeQL init to avoid Rosetta conflicts
      - name: Install XcodeGen
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Build shared framework (swift prerequisite)
        if: matrix.language == 'swift'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Create local.xcconfig for CI
        if: matrix.language == 'swift'
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: cd iosApp && xcodegen generate

      # --- CodeQL init (starts tracing for manual build-mode) ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # --- Traced builds ---
      - name: Build (java-kotlin)
        if: matrix.language == 'java-kotlin'
        env:
          GRADLE_OPTS: "-Xmx4g"
        run: >-
          ./gradlew --no-daemon
          -Pkotlin.daemon.enabled=false
          -Dkotlin.compiler.execution.strategy=in-process
          :shared:assembleAndroidMain
          :androidApp:assembleDebug

      - name: Resolve iOS Simulator destination
        if: matrix.language == 'swift'
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (swift)
        if: matrix.language == 'swift'
        # Per security audit M1: env var instead of ${{ }} interpolation.
        env:
          XCODE_DEST: ${{ steps.sim.outputs.dest }}
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "$XCODE_DEST" \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
