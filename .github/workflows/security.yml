name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Weekly Monday 6:17 AM UTC

# Same concurrency posture as ci.yml + e2e.yml — prevent rapid back-to-back
# pushes from queuing multiple Security runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            runner: ubuntu-latest
            build-mode: manual
          - language: swift
            runner: macos-latest
            build-mode: manual
    runs-on: ${{ matrix.runner }}
    # java-kotlin: CodeQL Kotlin extractor fails to capture KMP Android Kotlin
    # compilation. The error surfaces as "CodeQL detected code written in
    # Java/Kotlin but this run didn't build any of it".
    #
    # 2026-05-01 root-cause update: the AGP 9 KMP plugin
    # (`com.android.kotlin.multiplatform.library`, AGP 9.1.0 + Kotlin 2.3.20)
    # implements `:shared:compileAndroidMain` as a lifecycle task with no
    # direct kotlinc invocation — `./gradlew :shared:compileAndroidMain
    # --dry-run` shows zero compile work. The traced build below was
    # changed to `:shared:assembleAndroidMain :androidApp:assembleDebug`
    # to force real Kotlin compilation through the entire dependency
    # graph, giving the CodeQL extractor an actual kotlinc process to
    # hook into. The Android-only `assembleAndroidMain` variant is used
    # because the umbrella `:shared:assemble` would pull in iOS-native
    # link tasks that the `ubuntu-latest` runner cannot satisfy. Whether
    # this is sufficient to produce a non-empty CodeQL database is being
    # verified in CI — the job remains continue-on-error: true until two
    # consecutive green runs are observed, after which this flag and the
    # exclusion from required status checks should be removed.
    #
    # Related upstream issues / discussions:
    #   - github/codeql#20880          https://github.com/github/codeql/issues/20880
    #   - community discussion #151626 https://github.com/orgs/community/discussions/151626
    #   - JetBrains AGP 9 migration    https://blog.jetbrains.com/kotlin/2026/01/update-your-projects-for-agp9/
    #   - Android KMP plugin docs      https://developer.android.com/kotlin/multiplatform/plugin
    #   - CodeQL CLI 2.25.2 changelog  https://github.blog/changelog/2026-04-15-codeql-2-25-2-adds-kotlin-2-3-20-support-and-other-updates/
    #
    # The overlay-base database warning ("build-mode is set to manual
    # instead of none") is benign — CodeQL falls back to full
    # (non-incremental) analysis.
    continue-on-error: ${{ matrix.language == 'java-kotlin' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Pre-CodeQL setup (before tracing starts) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        # Pin to SHA per security audit C2.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # Swift: install XcodeGen before CodeQL init to avoid Rosetta conflicts
      - name: Install XcodeGen
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Build shared framework (swift prerequisite)
        if: matrix.language == 'swift'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Create local.xcconfig for CI
        if: matrix.language == 'swift'
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: cd iosApp && xcodegen generate

      # --- CodeQL init (starts tracing for manual build-mode) ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # --- Traced builds ---
      # See the 2026-05-01 root-cause update on the `continue-on-error`
      # line above: `compileAndroidMain` is a lifecycle task under AGP 9
      # KMP, so we run the Android-only assemble pipeline
      # (`:shared:assembleAndroidMain` + `:androidApp:assembleDebug`) to
      # force a real kotlinc invocation that the CodeQL extractor can
      # hook, while avoiding iOS-native link tasks that the
      # ubuntu-latest runner cannot satisfy.
      - name: Build (java-kotlin)
        if: matrix.language == 'java-kotlin'
        env:
          GRADLE_OPTS: "-Xmx4g"
        run: >-
          ./gradlew --no-daemon
          -Pkotlin.daemon.enabled=false
          -Dkotlin.compiler.execution.strategy=in-process
          :shared:assembleAndroidMain
          :androidApp:assembleDebug

      - name: Resolve iOS Simulator destination
        if: matrix.language == 'swift'
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (swift)
        if: matrix.language == 'swift'
        # Per security audit M1: env var instead of ${{ }} interpolation.
        env:
          XCODE_DEST: ${{ steps.sim.outputs.dest }}
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "$XCODE_DEST" \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
