name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Weekly Monday 6:17 AM UTC

jobs:
  codeql:
    name: CodeQL Analysis
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: swift
            build-mode: manual
    runs-on: [self-hosted, macos, apple-silicon, host]
    env:
      JAVA_HOME: /opt/homebrew/opt/openjdk@17
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      ANDROID_HOME: /Users/b150005/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/b150005/Library/Android/sdk
    # java-kotlin: CodeQL Kotlin extractor failed to capture in-process Gradle
    # build under self-hosted runner (issue under investigation, see CLAUDE.md
    # CI Known Limitations). The job is marked continue-on-error so it does not
    # block the workflow run; required status checks excludes this matrix entry.
    continue-on-error: ${{ matrix.language == 'java-kotlin' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        # Pin to SHA per security audit C2.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build shared framework (swift prerequisite)
        if: matrix.language == 'swift'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Create local.xcconfig for CI
        if: matrix.language == 'swift'
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: cd iosApp && xcodegen generate

      # --- CodeQL init (starts tracing for manual build-mode) ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # --- Traced builds ---
      - name: Build (java-kotlin)
        if: matrix.language == 'java-kotlin'
        env:
          GRADLE_OPTS: "-Xmx4g"
        run: >-
          ./gradlew --no-daemon
          -Pkotlin.daemon.enabled=false
          -Dkotlin.compiler.execution.strategy=in-process
          :shared:compileAndroidMain
          :androidApp:compileDebugKotlin

      - name: Resolve iOS Simulator destination
        if: matrix.language == 'swift'
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (swift)
        if: matrix.language == 'swift'
        # Per security audit M1: env var instead of ${{ }} interpolation.
        env:
          XCODE_DEST: ${{ steps.sim.outputs.dest }}
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "$XCODE_DEST" \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - name: Cleanup workspace + DerivedData + CodeQL temp (post-job)
        if: always()
        run: |
          set +e
          rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/shared/build" \
                 "$GITHUB_WORKSPACE/iosApp/build" "$GITHUB_WORKSPACE/androidApp/build" \
                 "$GITHUB_WORKSPACE/iosApp/iosApp.xcodeproj" 2>/dev/null
          rm -rf ~/Library/Developer/Xcode/DerivedData/iosApp-* 2>/dev/null
          # CodeQL temp databases
          rm -rf "$RUNNER_TEMP/codeql_databases" 2>/dev/null
          exit 0
