name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Defense in depth: lock GITHUB_TOKEN to read-only at the workflow level
# regardless of repository default. Per security audit H3.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-checks:
    name: Shared Module (Lint + Test + Coverage + Build)
    runs-on: [self-hosted, macos, apple-silicon, host]
    env:
      JAVA_HOME: /opt/homebrew/opt/openjdk@17
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      ANDROID_HOME: /Users/b150005/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/b150005/Library/Android/sdk
      # KMP shared module (Kotlin compile + Kover + iOS framework link) accumulates
      # state in the Gradle daemon across multiple invocations within one job.
      # Default Xmx is too small — observed "Gradle build daemon stopped: JVM GC
      # thrashing" on :shared:build after :shared:allTests + koverVerify. Host
      # has 32GB so 6g is safe.
      GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Gradle
        # Pin to SHA per security audit C2 (third-party action supply chain).
        # Dependabot keeps this current; the v6 alias would otherwise allow
        # malicious tag re-pointing to execute on host runner.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Verify i18n key sync (Android values/ + values-ja/ + iOS .xcstrings)
        run: ./scripts/verify-i18n-keys.sh

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck

      - name: Test shared module
        run: ./gradlew :shared:allTests

      - name: Generate coverage report and verify threshold (80%)
        run: ./gradlew :shared:koverXmlReport :shared:koverVerify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: shared/build/reports/kover/report.xml
          retention-days: 30

      - name: Build shared module
        run: ./gradlew :shared:build

      - name: Cleanup workspace + DerivedData (post-job)
        if: always()
        run: |
          set +e
          rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/shared/build" \
                 "$GITHUB_WORKSPACE/iosApp/build" "$GITHUB_WORKSPACE/androidApp/build" 2>/dev/null
          rm -rf ~/Library/Developer/Xcode/DerivedData/iosApp-* 2>/dev/null
          exit 0

  android:
    name: Android (Build + Test)
    runs-on: [self-hosted, macos, apple-silicon, host]
    needs: shared-checks
    env:
      JAVA_HOME: /opt/homebrew/opt/openjdk@17
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      ANDROID_HOME: /Users/b150005/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/b150005/Library/Android/sdk
      GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Gradle
        # Pin to SHA per security audit C2 (third-party action supply chain).
        # Dependabot keeps this current; the v6 alias would otherwise allow
        # malicious tag re-pointing to execute on host runner.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Run Android unit tests
        run: ./gradlew :androidApp:testDebugUnitTest

      - name: Build Android debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Cleanup workspace + DerivedData (post-job)
        if: always()
        run: |
          set +e
          rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/shared/build" \
                 "$GITHUB_WORKSPACE/iosApp/build" "$GITHUB_WORKSPACE/androidApp/build" 2>/dev/null
          rm -rf ~/Library/Developer/Xcode/DerivedData/iosApp-* 2>/dev/null
          exit 0

  ios:
    name: iOS (Build + Test)
    runs-on: [self-hosted, macos, apple-silicon, host]
    needs: shared-checks
    env:
      JAVA_HOME: /opt/homebrew/opt/openjdk@17
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Gradle
        # Pin to SHA per security audit C2 (third-party action supply chain).
        # Dependabot keeps this current; the v6 alias would otherwise allow
        # malicious tag re-pointing to execute on host runner.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build iOS shared framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Create local.xcconfig for CI
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Resolve iOS Simulator destination
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"
          echo "Resolved simulator: $UDID"

      - name: Build and test iOS app
        # Per security audit M1: assign step output to env var rather than
        # interpolating ${{ }} directly into shell — eliminates injection
        # surface even though the simctl-derived value is system-controlled.
        env:
          XCODE_DEST: ${{ steps.sim.outputs.dest }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "$XCODE_DEST" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: TestResults
          retention-days: 14

      - name: Cleanup workspace + DerivedData (post-job)
        if: always()
        run: |
          set +e
          rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/shared/build" \
                 "$GITHUB_WORKSPACE/iosApp/build" "$GITHUB_WORKSPACE/androidApp/build" \
                 "$GITHUB_WORKSPACE/iosApp/iosApp.xcodeproj" \
                 "$GITHUB_WORKSPACE/TestResults" 2>/dev/null
          rm -rf ~/Library/Developer/Xcode/DerivedData/iosApp-* 2>/dev/null
          exit 0
