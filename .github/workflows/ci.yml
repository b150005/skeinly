name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Defense in depth: lock GITHUB_TOKEN to read-only at the workflow level
# regardless of repository default. Per security audit H3.
permissions:
  contents: read

# Runner + JDK pinning rationale (applies to every macOS / setup-java step
# in this file):
#
# - `macos-26`: project requires macOS 26 (Tahoe) + Xcode 26.4+
#   per docs/en/ops/repo-policy.md. `macos-latest` currently aliases to
#   `macos-15` (Sequoia) — GitHub promotes the alias ~6 months
#   after each macOS major lands. Until promotion, the explicit pin is
#   the only way to keep dev/CI environments aligned. Bump to
#   `macos-27` annually when the next macOS major ships.
# - `java-version: 25`: latest LTS, fully supported by Gradle 9.5
#   (toolchain support since 9.1.0) + AGP 9.x. Project bytecode targets
#   stay at JVM_17 / JavaVersion.VERSION_17 (Android runtime requirement
#   in shared/build.gradle.kts + androidApp/build.gradle.kts) — only the
#   build-running JDK is upgraded.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-checks:
    name: Shared Module (Lint + Test + Coverage + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        # Pin to SHA per security audit C2 (third-party action supply chain).
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Verify i18n key sync (Android values/ + values-ja/ + iOS .xcstrings)
        run: ./gradlew verifyI18nKeys

      - name: Verify iOS IS_BETA flag matches Android BuildFlags.isBeta codegen rule
        run: ./gradlew verifyIosBetaFlag

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck

      - name: Test shared module
        run: ./gradlew :shared:allTests

      - name: Generate coverage report and verify threshold (80%)
        run: ./gradlew :shared:koverXmlReport :shared:koverVerify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: shared/build/reports/kover/report.xml
          retention-days: 30

      - name: Build shared module
        run: ./gradlew :shared:build

  android:
    name: Android (Build + Test)
    runs-on: ubuntu-latest
    needs: shared-checks
    # `development` Environment scope unlocks
    # FIREBASE_GOOGLE_SERVICES_JSON_BASE64 (Skeinly-Dev project, debug
    # variant). Repository-scoped secrets (SUPABASE_*) remain accessible.
    environment: development
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # Phase 24.2e (ADR-017 §3.5) — decode the Skeinly-Dev Firebase
      # project's google-services.json into the debug variant slot. The
      # secret is base64-encoded JSON registered against the
      # `development` GitHub Environment per docs/en/release-secrets.md;
      # the file slot is `androidApp/src/debug/` so AGP picks it up only
      # for `assembleDebug` (the release variant uses `src/release/`,
      # gated under the `production` Environment in release.yml). Both
      # files are git-ignored. Without the secret, `:androidApp:assembleDebug`
      # fails because the google-services Gradle plugin requires a
      # config file.
      - name: Decode Firebase google-services.json (debug)
        if: env.FIREBASE_DEV_BASE64 != ''
        env:
          FIREBASE_DEV_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p androidApp/src/debug
          echo "$FIREBASE_DEV_BASE64" | base64 -d > androidApp/src/debug/google-services.json

      - name: Run Android unit tests
        run: ./gradlew :androidApp:testDebugUnitTest

      - name: Build Android debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  ios:
    name: iOS (Build + Test)
    runs-on: macos-26
    needs: shared-checks
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build iOS shared framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      # Phase 26.3 (ADR-022 §6.2) — GOOGLE_REVERSE_CLIENT_ID xcconfig
      # variable is referenced by project.yml's CFBundleURLTypes. Empty
      # value is valid: xcconfig substitution writes an empty URL
      # scheme which iOS treats as no-op. CI does not exercise the
      # Google Sign-In flow (no Skeinly-Dev iOS plist registered yet);
      # local builds with the production plist auto-derive the value
      # at release time.
      - name: Create local.xcconfig for CI
        run: |
          cat > iosApp/local.xcconfig <<'EOF'
          DEVELOPMENT_TEAM =
          GOOGLE_REVERSE_CLIENT_ID =
          EOF

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Resolve iOS Simulator destination
        id: sim
        run: |
          # Pick the first available iPhone simulator by UDID
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"
          echo "Resolved simulator: $UDID"

      - name: Build and test iOS app
        # Per security audit M1: assign step output to env var rather than
        # interpolating ${{ }} directly into shell — eliminates injection
        # surface even though the simctl-derived value is system-controlled.
        # Vendor secrets are forwarded to xcodebuild as build settings so
        # Info.plist `$(VAR)` placeholders resolve correctly. Without this
        # the iOS app boots with empty SupabaseConfig and the ProjectList
        # ViewModel hangs on initial Supabase request, leaving 5 XCUITests
        # stuck on ProgressView (B4 root cause).
        env:
          XCODE_DEST: ${{ steps.sim.outputs.dest }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "$XCODE_DEST" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            SENTRY_DSN_IOS="$SENTRY_DSN_IOS" \
            POSTHOG_API_KEY="$POSTHOG_PROJECT_API_KEY" \
            POSTHOG_HOST="$POSTHOG_HOST" \
            | xcpretty; exit ${PIPESTATUS[0]}
