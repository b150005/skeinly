name: E2E Tests

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Allow branch pushes to cancel each other, but never cancel tag-triggered runs
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  android-e2e:
    name: Android E2E (Maestro)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK (local-only mode)
        run: SUPABASE_URL="" SUPABASE_ANON_KEY="" ./gradlew :androidApp:assembleDebug

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: "2.4.0"
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          set -o pipefail
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Dismiss any ANR/crash system dialogs (e.g. "Pixel Launcher isn't responding")
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS
            sleep 3
            adb install -r androidApp/build/outputs/apk/debug/androidApp-debug.apk
            maestro test --exclude-tags requires-supabase e2e/flows/android/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-android-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
          if-no-files-found: ignore

  ios-e2e:
    name: iOS E2E (Maestro)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build shared framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create local.xcconfig for CI
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Build iOS app for simulator (local-only mode)
        env:
          SUPABASE_URL: ""
          SUPABASE_ANON_KEY: ""
        run: |
          set -o pipefail
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-e2e \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty; exit ${PIPESTATUS[0]}

      - name: Boot iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Booted simulator: $UDID"

      - name: Install app on simulator
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          APP_PATH=$(find build/ios-e2e -name "iosApp.app" -path "*/Debug-iphonesimulator/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Built app not found under build/ios-e2e"
            exit 1
          fi
          xcrun simctl install "$SIM_UDID" "$APP_PATH"

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: "2.4.0"
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          set -o pipefail
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Run iOS E2E tests
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          maestro --device "$SIM_UDID" test \
            --exclude-tags skip-ios26,requires-supabase \
            e2e/flows/ios/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-ios-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
          if-no-files-found: ignore
