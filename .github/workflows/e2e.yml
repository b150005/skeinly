name: E2E Tests

# Triggers must include `pull_request` because `Android E2E (Maestro)` and
# `iOS E2E (Maestro)` are listed as required status checks on the
# `main-strict` ruleset (see docs/en/ops/repo-policy.md). Without the
# `pull_request` trigger here, every PR is structurally unmergeable —
# required checks expecting a workflow that never runs on PRs — and would
# need admin bypass for every merge. Match the trigger shape of `ci.yml`
# and `security.yml` so all 3 required-check workflows behave consistently.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Allow branch pushes to cancel each other, but never cancel tag-triggered runs
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

# Runner + JDK pinning rationale (see ci.yml header for full reasoning):
# - `macos-26`: matches dev environment (macOS 26 / Xcode 26.4+);
#   `macos-latest` still resolves to `macos-15` as of 2026-05.
# - `java-version: 25`: latest LTS, fully supported by Gradle 9.5 + AGP 9.x.
#   Bytecode targets remain at Java 17 (Android runtime requirement).

jobs:
  android-e2e:
    name: Android E2E (Maestro)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Phase 24.2e — `development` Environment scope unlocks
    # FIREBASE_GOOGLE_SERVICES_JSON_BASE64 (Skeinly-Dev project, debug
    # variant — same scope as ci.yml's `android` job).
    environment: development
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        # Pin to SHA per security audit C2.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # Phase 24.2e (ADR-017 §3.5) — Firebase config for the debug
      # variant E2E build (Skeinly-Dev project). Same shape as ci.yml's
      # android job. Without the secret, `assembleDebug` fails at the
      # google-services Gradle plugin step.
      - name: Decode Firebase google-services.json (debug)
        if: env.FIREBASE_DEV_BASE64 != ''
        env:
          FIREBASE_DEV_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p androidApp/src/debug
          echo "$FIREBASE_DEV_BASE64" | base64 -d > androidApp/src/debug/google-services.json

      - name: Build debug APK (local-only mode)
        run: SUPABASE_URL="" SUPABASE_PUBLISHABLE_KEY="" ./gradlew :androidApp:assembleDebug

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: "2.4.0"
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          set -o pipefail
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android E2E tests
        # Pin to SHA per security audit C2 (third-party action, executes shell
        # via 'script:' input — high-impact supply chain target).
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 4096
          heap-size: 1024
          cores: 2
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            sleep 30
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            sleep 2
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            sleep 2
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            sleep 2
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            sleep 2
            adb install -r androidApp/build/outputs/apk/debug/androidApp-debug.apk
            sleep 5
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            # Phase 24.2 (ADR-017 §3.5) — Maestro flows reference appId via
            # `${APP_ID}` (Android debug uses `applicationIdSuffix = ".dev"`).
            # Pass the value explicitly via `--env` rather than relying on
            # process-env auto-inheritance: (a) the env propagation from the
            # action's step-level `env:` block into the `script:` subprocess
            # is not contractually documented by reactivecircus/android-
            # emulator-runner, and (b) Maestro's documented contract for
            # flow-YAML variable substitution is `--env KEY=VALUE` per the
            # CLI reference, not host-env. Mirrors `e2e/run-android.sh` shape.
            maestro test --env APP_ID=io.github.b150005.skeinly.dev --exclude-tags requires-supabase e2e/flows/android/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-android-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
          if-no-files-found: ignore

  ios-e2e:
    name: iOS E2E (Maestro)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build shared framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create local.xcconfig for CI
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Build iOS app for simulator (local-only mode)
        # Forward the empty Supabase env vars to xcodebuild as build
        # settings so Info.plist `$(SUPABASE_URL)` / `$(SUPABASE_PUBLISHABLE_KEY)`
        # placeholders resolve to empty strings. Without this the
        # placeholders survive into the runtime Info.plist as literal
        # `$(SUPABASE_URL)` text — non-blank, so `SupabaseConfig.isConfigured`
        # evaluates true and AppRouter routes the test simulator to
        # LoginScreen, breaking every Maestro flow downstream.
        # AppRouter's `local_only_mode` launch arg in the Maestro flows
        # is the second line of defense; keeping the build-setting form
        # in sync with ci.yml ensures both layers stay aligned.
        env:
          SUPABASE_URL: ""
          SUPABASE_PUBLISHABLE_KEY: ""
        run: |
          set -o pipefail
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-e2e \
            CODE_SIGNING_ALLOWED=NO \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            | xcpretty; exit ${PIPESTATUS[0]}

      - name: Boot iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Booted simulator: $UDID"

      - name: Install app on simulator
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          APP_PATH=$(find build/ios-e2e -name "iosApp.app" -path "*/Debug-iphonesimulator/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Built app not found under build/ios-e2e"
            exit 1
          fi
          xcrun simctl install "$SIM_UDID" "$APP_PATH"

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: "2.4.0"
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          set -o pipefail
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Run iOS E2E tests
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          # Phase 24.2 (ADR-017 §3.5) — Maestro flows reference appId via
          # `${APP_ID}` for symmetry with the Android side. iOS uses a
          # single bundle id today (no debug suffix). Pass via `--env`
          # explicitly per Maestro's documented variable-substitution
          # contract (CLI reference) — process-env auto-inheritance is
          # not part of Maestro's documented behavior, and CI runs on
          # a fresh simulator with no fallback state. Mirrors
          # `e2e/run-ios.sh` shape.
          maestro --device "$SIM_UDID" test \
            --env APP_ID=io.github.b150005.skeinly \
            --exclude-tags skip-ios26,requires-supabase \
            e2e/flows/ios/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-ios-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
          if-no-files-found: ignore
