name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/public/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Per security audit H4: id-token: write should NOT live in a self-hosted
    # runner's process space. Pages deploy is a static-file upload that has no
    # macOS-specific dependency — keep on GitHub-hosted Linux.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
