name: iOS Self-Hosted (Host)

# Runs on the always-on host Mac registered as a self-hosted runner with labels
# self-hosted/macos/apple-silicon/host. Provides faster iOS test signal alongside
# the canonical macos-latest job in ci.yml. If the runner is offline (host shut
# down or runner crashed), this workflow fails — but the required status check
# `iOS (Build + Test)` from ci.yml continues to run on GitHub-hosted, so PR
# merges are not blocked.
#
# History note: originally targeted a Lume macOS VM (label `lume`) but pivoted
# to host-direct on 2026-04-27 — VM isolation provided minimal security benefit
# for a solo public repo where strict branch protection ensures only Owner-
# authored code reaches main, and the ~70GB VM disk + Setup Assistant pain
# outweighed the negligible isolation gain.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'shared/**'
      - 'iosApp/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/ios-self-hosted.yml'

concurrency:
  group: ios-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-self-hosted:
    name: iOS (Build + Test, Self-Hosted Host)
    runs-on: [self-hosted, macos, apple-silicon, host]
    timeout-minutes: 30
    env:
      JAVA_HOME: /opt/homebrew/opt/openjdk@17
      # Self-hosted runner shell does not source ~/.zprofile, so Homebrew's
      # /opt/homebrew/bin (xcodegen, gh) is not on PATH by default.
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v6

      - name: Verify pre-installed toolchain
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          "$JAVA_HOME/bin/java" --version
          xcodebuild -version
          xcodegen --version
          which gh

      - name: Build iOS shared framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Create local.xcconfig
        run: echo 'DEVELOPMENT_TEAM =' > iosApp/local.xcconfig

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Resolve iOS Simulator destination
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt, devs in data['devices'].items():
            if 'iOS' in rt:
              for d in devs:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=id=$UDID" >> "$GITHUB_OUTPUT"
          echo "Resolved simulator: $UDID"

      - name: Build and test iOS app
        run: |
          set -o pipefail
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination '${{ steps.sim.outputs.dest }}' \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-self-hosted-results
          path: TestResults
          retention-days: 14
