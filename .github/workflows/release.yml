name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

# Runner + JDK pinning rationale (see ci.yml header for full reasoning):
# - `macos-26`: matches dev environment (macOS 26 / Xcode 26.4+);
#   `macos-latest` still resolves to `macos-15` as of 2026-05.
# - `java-version: 25`: latest LTS, fully supported by Gradle 9.5 + AGP 9.x.
#   Bytecode targets remain at Java 17 (Android runtime requirement).

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $TAG"

      # Phase 39 (W3 / 2026-05-11) — pre-release verification that the
      # Universal Link / Android App Link infrastructure is live at the
      # root domain. Hosted in the separate User Pages repo
      # `b150005/b150005.github.io` (Skeinly Project Pages at
      # /skeinly/ cannot host these — Apple/Google ignore subpath AASA).
      #
      # Failing here BEFORE Android/iOS builds saves ~25min of CI time
      # on a release where the AASA / assetlinks accidentally went
      # missing (e.g. an unrelated cleanup commit on the User Pages
      # repo). The downstream tag-push reaches alpha testers as a
      # broken Universal Link experience without this gate; better to
      # fail at the validation step.
      #
      # The package_name + SHA256 fingerprint match is the *minimum*
      # health check — Apple/Google's own verifier checks more (e.g.
      # appIDs format, JSON shape), but those errors surface as 200
      # responses, so we lean on shape + content checks here.
      - name: Verify Universal Link infrastructure is live
        run: |
          set -euo pipefail
          AASA_URL="https://b150005.github.io/.well-known/apple-app-site-association"
          ASSETLINKS_URL="https://b150005.github.io/.well-known/assetlinks.json"
          EXPECTED_APP_ID="L9ZR4679P5.io.github.b150005.skeinly"
          EXPECTED_PACKAGE="io.github.b150005.skeinly"
          EXPECTED_SHA256_PREFIX="18:B3:0D:4F"

          AASA=$(curl -fsSL --max-time 10 --retry 3 --retry-delay 5 \
            --retry-all-errors "$AASA_URL")
          echo "$AASA" | grep -q "$EXPECTED_APP_ID" \
            || { echo "::error::AASA missing expected appID $EXPECTED_APP_ID"; exit 1; }
          echo "OK   AASA returned 200 and contains expected appID"

          ASSETLINKS=$(curl -fsSL --max-time 10 --retry 3 --retry-delay 5 \
            --retry-all-errors "$ASSETLINKS_URL")
          echo "$ASSETLINKS" | grep -q "\"$EXPECTED_PACKAGE\"" \
            || { echo "::error::assetlinks missing expected package_name $EXPECTED_PACKAGE"; exit 1; }
          echo "$ASSETLINKS" | grep -q "$EXPECTED_SHA256_PREFIX" \
            || { echo "::error::assetlinks missing expected SHA256 prefix $EXPECTED_SHA256_PREFIX"; exit 1; }
          echo "OK   assetlinks returned 200 and contains expected package + SHA256"

  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    needs: validate-tag
    # `production` Environment scope unlocks GOOGLE_PLAY_PUBLISHER_SA_JSON_BASE64.
    # Repository-scoped secrets (KEYSTORE_*, SUPABASE_*) remain accessible.
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

      # Phase 24.2e (ADR-017 §3.5) — Firebase config for the release
      # variant (Skeinly Blaze project, package
      # `io.github.b150005.skeinly`). Decoded from the
      # `production`-Environment-scoped GitHub Secret. The file slot
      # is `androidApp/src/release/` so AGP picks it up only for
      # `bundleRelease` / `assembleRelease`. Without the secret, the
      # google-services Gradle plugin fails at task graph configuration.
      - name: Decode Firebase google-services.json (release)
        if: env.FIREBASE_PROD_BASE64 != ''
        env:
          FIREBASE_PROD_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p androidApp/src/release
          echo "$FIREBASE_PROD_BASE64" | base64 -d > androidApp/src/release/google-services.json

      - name: Build release App Bundle (AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Build release APK (artifact-only fallback)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: ./gradlew :androidApp:assembleRelease

      # Phase 39 closed beta — auto-upload the signed AAB to Google Play
      # Internal track via gradle-play-publisher 4.0.0. Gated on the SA
      # JSON secret being present so a half-configured release (e.g. a
      # tag pushed before user finishes Play Console setup) just produces
      # an APK + AAB artifact without touching Play Console. The plugin
      # reads the credentials JSON from ANDROID_PUBLISHER_CREDENTIALS env
      # var when serviceAccountCredentials is unset (per gradle-play-
      # publisher 4.x README CI guidance — file-based path adds disk I/O
      # and a temp-file cleanup edge case for no benefit). Decoded
      # verbatim from the base64-stored GitHub secret.
      #
      # Track + releaseStatus are fixed in androidApp/build.gradle.kts
      # `play { }` block: track="internal", status=DRAFT — user manually
      # promotes Draft → Internal testers in Play Console after each
      # tag push. The SA's Play Console permissions are scoped to
      # "Release to testing tracks" only, so production rollout is
      # structurally impossible regardless of releaseStatus.
      - name: Check Play Publisher SA secret
        id: play-publisher
        env:
          PLAY_SA_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_PUBLISHER_SA_JSON_BASE64 }}
        run: |
          if [ -n "$PLAY_SA_JSON_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Play Publisher SA configured — will upload AAB to Internal track"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GOOGLE_PLAY_PUBLISHER_SA_JSON_BASE64 not configured — skipping Play upload"
          fi

      - name: Upload AAB to Google Play Internal track
        if: steps.play-publisher.outputs.available == 'true'
        env:
          PLAY_SA_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_PUBLISHER_SA_JSON_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          export ANDROID_PUBLISHER_CREDENTIALS="$(echo "$PLAY_SA_JSON_BASE64" | base64 -d)"
          ./gradlew :androidApp:publishBundle

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: androidApp/build/outputs/bundle/release/*.aab
          retention-days: 90

  build-ios:
    name: Build iOS Release
    runs-on: macos-26
    needs: validate-tag
    outputs:
      ipa-available: ${{ steps.ios-signing.outputs.available }}
    steps:
      - uses: actions/checkout@v6

      # Check the cert + team ID secrets needed for signing. The
      # provisioning profile is fetched from Apple Developer Portal
      # at runtime via `sigh` (Fastfile), so APPLE_PROVISIONING_PROFILE_BASE64
      # is no longer required (kept in repo Secrets for now until the
      # first successful run on the new pipeline confirms removal-safe).
      # Uses env vars populated from secrets so that [ -n "$VAR" ] correctly
      # detects empty/absent values (the documented pattern for GitHub Actions).
      - name: Check iOS signing secrets
        id: ios-signing
        env:
          IOS_CERT: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PW: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$IOS_CERT" ] && [ -n "$IOS_CERT_PW" ] && [ -n "$TEAM_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets configured"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS signing secrets not configured — skipping signed build"
          fi

      - name: Check TestFlight upload secrets
        id: testflight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER" ] && [ -n "$ASC_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "TestFlight upload secrets configured"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TestFlight upload secrets not configured — skipping upload"
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Set up Ruby + Bundler (for fastlane)
        if: steps.ios-signing.outputs.available == 'true'
        # SHA-pinned per Phase 39 W3 security audit completion (2026-05-11).
        # Resolves the Phase 39.0.1 C2 todo (third-party action with read
        # access to secrets via downstream fastlane env). Dependabot's
        # github-actions ecosystem tracks the pin and PRs updates when
        # ruby/setup-ruby ships a new release.
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: iosApp

      - name: Build iOS release framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      # Phase 39 (W3 / 2026-05-11) — local.xcconfig drives the
      # generated .xcodeproj's signing config. DEVELOPMENT_TEAM is the
      # only value that varies between local-dev (each developer's
      # personal team) and CI (the project's release-distribution team
      # captured in APPLE_TEAM_ID Secret). The xcconfig also has to
      # exist before `xcodegen generate` runs, because project.yml
      # references it via the `configFiles` block.
      #
      # Other signing settings (CODE_SIGN_STYLE = Manual,
      # CODE_SIGN_IDENTITY = Apple Distribution, PROVISIONING_PROFILE_SPECIFIER
      # = Skeinly App Store) are baked into project.yml's
      # `settings.configs.Release` so they apply consistently regardless
      # of who runs xcodegen. The xcargs in fastlane build_app's
      # `build_xcargs` defensively re-asserts DEVELOPMENT_TEAM at the
      # xcodebuild invocation, in case the xcconfig substitution somehow
      # didn't land — belt-and-suspenders.
      - name: Create local.xcconfig for CI
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > iosApp/local.xcconfig <<EOF
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          EOF

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      # fastlane handles: setup_ci keychain → import .p12 cert → fetch
      # provisioning profile from Apple Developer Portal via sigh + ASC
      # API key (Phase 39 / 2026-05-10 Path Y refactor) → build_app
      # (archive + export IPA) → upload_to_testflight. The
      # APPLE_PROVISIONING_PROFILE_BASE64 secret is intentionally NOT
      # passed — sigh fetches the profile by name ("Skeinly App Store")
      # at runtime so capability changes propagate without a secret
      # update. Replaces the previous ~140 lines of inline xcodebuild
      # + security + plist scripting (Phase 19c) with a single
      # `bundle exec fastlane beta` invocation. Per ADR-007 / Phase 39.0.x.
      - name: Run fastlane beta (sign + archive + upload to TestFlight)
        if: steps.ios-signing.outputs.available == 'true' && steps.testflight.outputs.available == 'true'
        working-directory: iosApp
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          MARKETING_VERSION: ${{ needs.validate-tag.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: bundle exec fastlane beta

      # Build IPA without TestFlight upload — runs when signing is available
      # but the App Store Connect API secrets are missing. The build_ipa
      # lane currently expects the developer's local keychain + manually-
      # installed profile, so this CI branch is best-effort only. Skip
      # path stays half-functional until ASC API secrets are configured,
      # at which point the beta lane above is used instead.
      - name: Run fastlane build_ipa (sign + archive only, no upload)
        if: steps.ios-signing.outputs.available == 'true' && steps.testflight.outputs.available != 'true'
        working-directory: iosApp
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MARKETING_VERSION: ${{ needs.validate-tag.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: bundle exec fastlane build_ipa

      - name: Verify IPA was produced
        if: steps.ios-signing.outputs.available == 'true'
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa-output" -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::fastlane did not produce an IPA at \$RUNNER_TEMP/ipa-output/"
            exit 1
          fi
          echo "IPA produced: $IPA_PATH"

      - name: Upload IPA artifact
        if: steps.ios-signing.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 90

      - name: Upload iOS framework (fallback when signing unavailable)
        if: steps.ios-signing.outputs.available != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-framework
          path: shared/build/bin/iosArm64/releaseFramework/
          retention-days: 90

      # Phase 39 (W4 / 2026-05-11) — diagnostic artifact bundle for iOS
      # archive failures. The fastlane CI summary surfaces only the
      # xcbeautify-filtered tail of xcodebuild output; the actual signing
      # analyzer details + dependency graph + entitlement resolution live
      # in `gym/iosApp-iosApp.log` (raw xcodebuild stderr) and the
      # XCBuildData build description. The decoded provisioning profile
      # XML is the ground truth for which capabilities the active profile
      # *actually* carries (Associated Domains, Push, etc.) — Apple
      # Developer Portal UI sometimes shows a stale capability set vs the
      # provisioned profile bytes.
      #
      # Runs on iOS Release job failure with signing configured (no point
      # diagnosing the skip path). Bundles into a single artifact dir
      # under $RUNNER_TEMP so cleanup happens automatically when the
      # runner VM recycles. Anything secret-derived (`.p12`, raw key
      # bytes) is intentionally NOT included — only public-facing
      # provisioning data + xcodebuild logs.
      - name: Collect iOS build failure diagnostics
        if: failure() && steps.ios-signing.outputs.available == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +e  # best-effort: don't fail the diagnostics gather itself
          DIAG="$RUNNER_TEMP/ios-failure-diagnostics"
          mkdir -p "$DIAG"

          # 1. gym/xcodebuild raw log — the source of truth for signing
          #    analyzer output, target dependency graph, and Xcode 26's
          #    new signing diagnostic messages.
          if [ -f "$HOME/Library/Logs/gym/iosApp-iosApp.log" ]; then
            cp "$HOME/Library/Logs/gym/iosApp-iosApp.log" "$DIAG/gym-iosApp-iosApp.log"
            echo "OK   gym log captured ($(wc -l < "$DIAG/gym-iosApp-iosApp.log") lines)"
          else
            echo "::warning::gym log not found at \$HOME/Library/Logs/gym/iosApp-iosApp.log"
            ls -la "$HOME/Library/Logs/gym/" 2>/dev/null > "$DIAG/gym-dir-listing.txt" || true
          fi

          # 2. XCBuildData — Xcode's build description for the archive.
          #    Contains the resolved build settings per target (so we can
          #    see exactly which CODE_SIGN_IDENTITY each target was asked
          #    to use), the target dependency graph (so we can see if a
          #    test target is unexpectedly pulled into the archive), and
          #    the SDK selection. The directory is small (~MB scale) so
          #    we copy it whole rather than cherry-pick.
          XCBUILD_ROOT="$HOME/Library/Developer/Xcode/DerivedData"
          if [ -d "$XCBUILD_ROOT" ]; then
            find "$XCBUILD_ROOT" -type d -name "*.xcbuilddata" -print0 2>/dev/null \
              | while IFS= read -r -d '' xcbd; do
                  rel="$(basename "$(dirname "$(dirname "$xcbd")")")__$(basename "$xcbd")"
                  cp -R "$xcbd" "$DIAG/xcbuilddata__$rel" 2>/dev/null || true
                done
            echo "OK   XCBuildData copied"
          fi

          # 3. Decoded provisioning profile — `security cms -D` outputs
          #    the profile's plist XML, which lists Entitlements (the
          #    ground truth for Associated Domains / aps-environment /
          #    etc. capabilities). The .mobileprovision file is fetched
          #    by sigh into $RUNNER_TEMP and is also installed into the
          #    Xcode profile dir; we read from $RUNNER_TEMP because it
          #    survives even if installation failed.
          PROFILE_PATH="$RUNNER_TEMP/distribution.mobileprovision"
          if [ -f "$PROFILE_PATH" ]; then
            security cms -D -i "$PROFILE_PATH" > "$DIAG/distribution-profile-decoded.plist" 2>&1
            echo "OK   provisioning profile decoded"
            # Extract just the entitlements block for quick visual diff.
            /usr/libexec/PlistBuddy -c "Print :Entitlements" "$DIAG/distribution-profile-decoded.plist" \
              > "$DIAG/distribution-profile-entitlements.txt" 2>&1 || true
          else
            echo "::warning::Provisioning profile not found at $PROFILE_PATH"
          fi

          # 4. Keychain inventory — which signing identities are present
          #    after import_certificate ran. If "Apple Distribution"
          #    isn't here, the .p12 import silently failed; if "iOS
          #    Development" is missing, that's expected (we don't import
          #    one). The output redacts CN serial numbers but exposes
          #    cert names + team affiliations.
          security find-identity -v -p codesigning > "$DIAG/keychain-identities.txt" 2>&1
          echo "OK   keychain identities listed"

          # 5. iosApp.xcodeproj signing settings — what xcodegen generated
          #    for both Debug and Release. project.pbxproj is plain text;
          #    we grep for the signing-relevant lines.
          PBX="iosApp/iosApp.xcodeproj/project.pbxproj"
          if [ -f "$PBX" ]; then
            grep -E 'CODE_SIGN_(STYLE|IDENTITY|ENTITLEMENTS)|PROVISIONING_PROFILE|DEVELOPMENT_TEAM' \
              "$PBX" > "$DIAG/pbxproj-signing.txt" 2>&1
            echo "OK   pbxproj signing settings extracted"
          fi

          # 6. local.xcconfig — what the CI step wrote (DEVELOPMENT_TEAM
          #    redacted via the *** mask if the secret was actually
          #    substituted).
          if [ -f "iosApp/local.xcconfig" ]; then
            sed "s|$APPLE_TEAM_ID|<TEAM_ID_REDACTED>|g" iosApp/local.xcconfig \
              > "$DIAG/local.xcconfig" 2>&1
            echo "OK   local.xcconfig captured (team ID redacted)"
          fi

          # 7. Listing summary so the artifact landing page shows what
          #    we have without unzipping.
          ls -laR "$DIAG" > "$DIAG/_listing.txt" 2>&1 || true
          echo "Diagnostics bundle prepared at $DIAG"

      - name: Upload iOS build failure diagnostics
        if: failure() && steps.ios-signing.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-failure-diagnostics
          path: ${{ runner.temp }}/ios-failure-diagnostics/
          retention-days: 14
          if-no-files-found: warn

      # Defense-in-depth cleanup. fastlane's setup_ci creates an
      # ephemeral keychain that's normally torn down at runner shutdown,
      # but explicit cleanup avoids leaks if the build aborts mid-run.
      - name: Clean up signing artifacts
        if: always()
        run: |
          security delete-keychain fastlane_tmp_keychain 2>/dev/null || true
          rm -f "$RUNNER_TEMP/distribution.p12" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/distribution.mobileprovision" 2>/dev/null || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null || true
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8 2>/dev/null || true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-android, build-ios]
    steps:
      - uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release-apk
          path: artifacts/android

      - name: Download iOS IPA artifact
        if: needs.build-ios.outputs.ipa-available == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ios-release-ipa
          path: artifacts/ios
        continue-on-error: true

      - name: Verify expected IPA artifact
        if: needs.build-ios.outputs.ipa-available == 'true'
        run: |
          if [ ! -d artifacts/ios ] || [ -z "$(find artifacts/ios -name '*.ipa' 2>/dev/null)" ]; then
            echo "::warning::IPA was expected (signing configured) but not found in artifacts"
          fi

      - name: Create GitHub Release
        # Pin to SHA per security audit C2 (third-party action with secrets access).
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.validate-tag.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            artifacts/android/*.apk
            artifacts/ios/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
