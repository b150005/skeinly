name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $TAG"

  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 90

  build-ios:
    name: Build iOS Release
    runs-on: macos-latest
    needs: validate-tag
    outputs:
      ipa-available: ${{ steps.ios-signing.outputs.available }}
    steps:
      - uses: actions/checkout@v6

      # Check if all four signing secrets are configured.
      # Uses env vars populated from secrets so that [ -n "$VAR" ] correctly
      # detects empty/absent values (the documented pattern for GitHub Actions).
      - name: Check iOS signing secrets
        id: ios-signing
        env:
          IOS_CERT: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PW: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$IOS_CERT" ] && [ -n "$IOS_CERT_PW" ] && \
             [ -n "$IOS_PROFILE" ] && [ -n "$TEAM_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets configured"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS signing secrets not configured — skipping signed build"
          fi

      - name: Check TestFlight upload secrets
        id: testflight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER" ] && [ -n "$ASC_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "TestFlight upload secrets configured"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TestFlight upload secrets not configured — skipping upload"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Ruby + Bundler (for fastlane)
        if: steps.ios-signing.outputs.available == 'true'
        # TODO Phase 39.x: pin to SHA per security audit C2 (third-party action
        # with read access to secrets via downstream env). Track the pinned ref
        # via Dependabot's github-actions ecosystem. See docs/en/repo-policy.md.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: iosApp

      - name: Build iOS release framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      # XcodeGen requires local.xcconfig to exist. fastlane's build_app step
      # overrides DEVELOPMENT_TEAM via xcargs, so this file is always empty.
      - name: Create local.xcconfig for CI
        run: echo "DEVELOPMENT_TEAM =" > iosApp/local.xcconfig

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      # fastlane handles: setup_ci keychain → import .p12 cert →
      # install .mobileprovision → build_app (archive + export IPA) →
      # upload_to_testflight. Replaces the previous ~140 lines of inline
      # xcodebuild + security + plist scripting (Phase 19c) with a single
      # `bundle exec fastlane beta` invocation. Per ADR-007 / Phase 39.0.x.
      - name: Run fastlane beta (sign + archive + upload to TestFlight)
        if: steps.ios-signing.outputs.available == 'true' && steps.testflight.outputs.available == 'true'
        working-directory: iosApp
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          MARKETING_VERSION: ${{ needs.validate-tag.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bundle exec fastlane beta

      # Build IPA without TestFlight upload — runs when signing is available
      # but the App Store Connect API secrets are missing. Useful for
      # signed-build verification without exposing TestFlight to a
      # half-configured release.
      - name: Run fastlane build_ipa (sign + archive only, no upload)
        if: steps.ios-signing.outputs.available == 'true' && steps.testflight.outputs.available != 'true'
        working-directory: iosApp
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MARKETING_VERSION: ${{ needs.validate-tag.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bundle exec fastlane build_ipa

      - name: Verify IPA was produced
        if: steps.ios-signing.outputs.available == 'true'
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa-output" -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::fastlane did not produce an IPA at \$RUNNER_TEMP/ipa-output/"
            exit 1
          fi
          echo "IPA produced: $IPA_PATH"

      - name: Upload IPA artifact
        if: steps.ios-signing.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 90

      - name: Upload iOS framework (fallback when signing unavailable)
        if: steps.ios-signing.outputs.available != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-framework
          path: shared/build/bin/iosArm64/releaseFramework/
          retention-days: 90

      # Defense-in-depth cleanup. fastlane's setup_ci creates an
      # ephemeral keychain that's normally torn down at runner shutdown,
      # but explicit cleanup avoids leaks if the build aborts mid-run.
      - name: Clean up signing artifacts
        if: always()
        run: |
          security delete-keychain fastlane_tmp_keychain 2>/dev/null || true
          rm -f "$RUNNER_TEMP/distribution.p12" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/distribution.mobileprovision" 2>/dev/null || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null || true
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8 2>/dev/null || true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-android, build-ios]
    steps:
      - uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release-apk
          path: artifacts/android

      - name: Download iOS IPA artifact
        if: needs.build-ios.outputs.ipa-available == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ios-release-ipa
          path: artifacts/ios
        continue-on-error: true

      - name: Verify expected IPA artifact
        if: needs.build-ios.outputs.ipa-available == 'true'
        run: |
          if [ ! -d artifacts/ios ] || [ -z "$(find artifacts/ios -name '*.ipa' 2>/dev/null)" ]; then
            echo "::warning::IPA was expected (signing configured) but not found in artifacts"
          fi

      - name: Create GitHub Release
        # Pin to SHA per security audit C2 (third-party action with secrets access).
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.validate-tag.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            artifacts/android/*.apk
            artifacts/ios/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
