name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $TAG"

  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 90

  build-ios:
    name: Build iOS Release
    runs-on: macos-latest
    needs: validate-tag
    outputs:
      ipa-available: ${{ steps.ios-signing.outputs.available }}
    steps:
      - uses: actions/checkout@v6

      # Check if all four signing secrets are configured.
      # Uses env vars populated from secrets so that [ -n "$VAR" ] correctly
      # detects empty/absent values (the documented pattern for GitHub Actions).
      - name: Check iOS signing secrets
        id: ios-signing
        env:
          IOS_CERT: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PW: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$IOS_CERT" ] && [ -n "$IOS_CERT_PW" ] && \
             [ -n "$IOS_PROFILE" ] && [ -n "$TEAM_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets configured"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS signing secrets not configured — skipping signed build"
          fi

      - name: Check TestFlight upload secrets
        id: testflight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER" ] && [ -n "$ASC_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "TestFlight upload secrets configured"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TestFlight upload secrets not configured — skipping upload"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Apple certificate and provisioning profile
        if: steps.ios-signing.outputs.available == 'true'
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PP_PATH="$RUNNER_TEMP/distribution.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)

          # Decode secrets to files
          echo "$IOS_DISTRIBUTION_CERT_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate — restrict access to codesign and security only
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DISTRIBUTION_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add keychain to search list (prepend to existing)
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            "$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          # Export for cleanup step.
          # Note: if this step fails before this line, the keychain will persist
          # until the runner VM is recycled (ephemeral GitHub-hosted runners only).
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build iOS release framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      # XcodeGen requires local.xcconfig to exist. The xcodebuild archive step
      # overrides DEVELOPMENT_TEAM via CLI argument, so this file is always empty.
      - name: Create local.xcconfig for CI
        run: echo "DEVELOPMENT_TEAM =" > iosApp/local.xcconfig

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Archive iOS app
        if: steps.ios-signing.outputs.available == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ needs.validate-tag.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"
          exit ${PIPESTATUS[0]}

      - name: Prepare export configuration and API key
        if: steps.ios-signing.outputs.available == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          # Determine export destination based on TestFlight secret availability
          if [ "${{ steps.testflight.outputs.available }}" = "true" ]; then
            EXPORT_DESTINATION="upload"
          else
            EXPORT_DESTINATION="export"
          fi

          # Extract provisioning profile name from installed profile
          PP_FILES=(~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision)
          if [ ${#PP_FILES[@]} -eq 0 ] || [ ! -f "${PP_FILES[0]}" ]; then
            echo "::error::No provisioning profile found in ~/Library/MobileDevice/Provisioning Profiles/"
            exit 1
          fi
          PP_PATH="${PP_FILES[0]}"

          DECODED_PLIST="$RUNNER_TEMP/decoded_profile.plist"
          security cms -D -i "$PP_PATH" > "$DECODED_PLIST"
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$DECODED_PLIST")
          rm -f "$DECODED_PLIST"

          if [ -z "$PP_NAME" ]; then
            echo "::error::Failed to extract provisioning profile name"
            exit 1
          fi
          echo "Using provisioning profile: $PP_NAME"

          # Generate ExportOptions.plist
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>destination</key>
              <string>${EXPORT_DESTINATION}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>io.github.b150005.knitnote.ios</key>
                  <string>${PP_NAME}</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST

          # Decode App Store Connect API key (if available, for xcodebuild upload)
          if [ -n "$APP_STORE_CONNECT_API_KEY_BASE64" ] && [ -n "$APP_STORE_CONNECT_API_KEY_ID" ]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
            echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"
            echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Export IPA and upload to TestFlight
        if: steps.ios-signing.outputs.available == 'true' && steps.testflight.outputs.available == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          # xcodebuild -exportArchive with auth key params and destination=upload
          # handles both IPA export and App Store Connect upload in a single step.
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa-output" \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-export.log"
          exit ${PIPESTATUS[0]}

      - name: Export IPA only (no TestFlight upload)
        if: steps.ios-signing.outputs.available == 'true' && steps.testflight.outputs.available != 'true'
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa-output" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-export.log"
          exit ${PIPESTATUS[0]}

      - name: Verify IPA was produced
        if: steps.ios-signing.outputs.available == 'true'
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa-output" -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::xcodebuild -exportArchive did not produce an IPA"
            exit 1
          fi
          echo "IPA produced: $IPA_PATH"

      - name: Upload IPA artifact
        if: steps.ios-signing.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 90

      - name: Upload iOS framework (fallback when signing unavailable)
        if: steps.ios-signing.outputs.available != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-framework
          path: shared/build/bin/iosArm64/releaseFramework/
          retention-days: 90

      - name: Clean up signing artifacts
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP/distribution.p12" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/distribution.mobileprovision" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/ExportOptions.plist" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/decoded_profile.plist" 2>/dev/null || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null || true
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8 2>/dev/null || true
          rm -f "$API_KEY_PATH" 2>/dev/null || true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-android, build-ios]
    steps:
      - uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release-apk
          path: artifacts/android

      - name: Download iOS IPA artifact
        if: needs.build-ios.outputs.ipa-available == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ios-release-ipa
          path: artifacts/ios
        continue-on-error: true

      - name: Verify expected IPA artifact
        if: needs.build-ios.outputs.ipa-available == 'true'
        run: |
          if [ ! -d artifacts/ios ] || [ -z "$(find artifacts/ios -name '*.ipa' 2>/dev/null)" ]; then
            echo "::warning::IPA was expected (signing configured) but not found in artifacts"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.validate-tag.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            artifacts/android/*.apk
            artifacts/ios/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
